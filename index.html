function tTick(){
  clearInterval(tInt);
  tInt=setInterval(function(){
    if(!G.timer.running)return;
    // Use wall clock: calculate remaining from endTime
    var remaining=Math.max(0,Math.round((G.timer.endTime-Date.now())/1000));
    if(remaining<=0){
      G.timer.mins=0;G.timer.seconds=0;
      clearInterval(tInt);G.timer.running=false;G.timer.finished=true;
      render();alarm();return;
    }
    G.timer.mins=Math.floor(remaining/60);
    G.timer.seconds=remaining%60;
    if(G.tab==="timer")render();
  },500); // Poll every 500ms so it never lags more than half a second
}
function alarm(){
  document.body.classList.add("flash-alarm");
  setTimeout(function(){document.body.classList.remove("flash-alarm");},3500);
  // Sound
  try{var ctx=new(window.AudioContext||window.webkitAudioContext)();function beep(f,s,d){var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type="sine";g.gain.setValueAtTime(0,ctx.currentTime+s);g.gain.linearRampToValueAtTime(.4,ctx.currentTime+s+.05);g.gain.linearRampToValueAtTime(0,ctx.currentTime+s+d);o.start(ctx.currentTime+s);o.stop(ctx.currentTime+s+d+.05);}beep(520,.0,.18);beep(620,.25,.18);beep(780,.5,.35);beep(520,1.1,.18);beep(620,1.35,.18);beep(780,1.6,.35);beep(880,2.2,.6);}catch(e){}
  // Browser notification (works even when tab is in background / fullscreen game)
  var mins=Math.round((G.timer.totalSeconds||0)/60);
  var msg=mins>0?"Your "+mins+" minute timer is done. Well done, adventurer!":"Timer done. Well done, adventurer!";
  if("Notification" in window){
    if(Notification.permission==="granted"){
      new Notification("Life RPG — Time is up! ⚔️",{body:msg,icon:"icon-192.png",requireInteraction:false});
    } else if(Notification.permission!=="denied"){
      Notification.requestPermission().then(function(perm){
        if(perm==="granted"){new Notification("Life RPG — Time is up! ⚔️",{body:msg,icon:"icon-192.png",requireInteraction:false});}
      });
    }
  }
  showToast("Time is up! Well done, adventurer.");
}

function getSkillMsg(skillId){
  var msgs=SKILL_MESSAGES[skillId]||["Keep going. The legend grows."];
  return msgs[Math.floor(Math.random()*msgs.length)];
}

function getSkillColor(skillId){
  var map={strength:"#e85d3a",endurance:"#e8923a",focus:"#4a8fff",discipline:"#8b6fe8",wisdom:"#2ab88a",creativity:"#5ab83a",mindset:"#c456a0"};

function showLvlUp(skill,newLevel){
  lvlUpQueue.push({skill:skill,level:newLevel});
  if(!lvlUpShowing)processLvlUpQueue();
}

function processLvlUpQueue(){
  if(lvlUpQueue.length===0){lvlUpShowing=false;return;}
  lvlUpShowing=true;
  var item=lvlUpQueue.shift();
  var skill=item.skill,level=item.level;
  var isTL=item.isTotalLevel||false;

  var color=isTL?"#f4c842":getSkillColor(skill.id);
  var msg=isTL
    ?TOTAL_LV_MESSAGES[Math.floor(Math.random()*TOTAL_LV_MESSAGES.length)]
    :getSkillMsg(skill.id);

  var numEl=document.getElementById("lvlup-num");
  var skillEl=document.getElementById("lvlup-skill");
  var subEl=document.getElementById("lvlup-sub");
  var titleEl=document.querySelector(".lvlup-title");
  var overlay=document.getElementById("lvlup-overlay");

  if(!numEl||!overlay)return;

  if(titleEl)titleEl.textContent=isTL?"Total Level Up!":"Level Up!";
  numEl.textContent=level;
  numEl.style.color=color;
  numEl.style.animation="none";
  skillEl.textContent=isTL?"Lv."+level+" Total":""+skill.name+" — Lv."+level;
  skillEl.style.color=color;
  subEl.textContent=msg;

  overlay.classList.add("show");
  requestAnimationFrame(function(){
    numEl.style.animation="lvlup-glow 1.5s ease-in-out infinite";
  });

  stopFireworksForce(); // clear any previous
  startFireworks(color);
  // No auto-stop — fireworks stop when user clicks Continue
}

// ── Fireworks ──────────────────────────────────
var fwInterval=null;
var fwParticles=[];
var fwActiveCount=0;

function startFireworks(primaryColor){
  fwActiveCount++;
  var canvas=document.getElementById("lvlup-canvas");
  if(!canvas)return;
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  fwParticles=[];

  // Launch initial burst
  launchBurst(canvas.width*0.3,canvas.height*0.3,primaryColor);
  launchBurst(canvas.width*0.7,canvas.height*0.25,"#f4c842");
  launchBurst(canvas.width*0.5,canvas.height*0.2,primaryColor);

  var frame=0;
  fwInterval=setInterval(function(){
    frame++;
    // New bursts periodically
    if(frame%28===0){
      launchBurst(
        canvas.width*(0.2+Math.random()*0.6),
        canvas.height*(0.1+Math.random()*0.35),
        [primaryColor,"#f4c842","#ffffff","#c456a0","#4a8fff"][Math.floor(Math.random()*5)]
      );
    }
    drawFireworks(canvas);
  },16); // ~60fps
}

function stopFireworks(){
  fwActiveCount=Math.max(0,fwActiveCount-1);
  if(fwActiveCount>0)return; // another caller still running
  clearInterval(fwInterval);
  fwInterval=null;
  fwParticles=[];
  var canvas=document.getElementById("lvlup-canvas");
  if(canvas){var ctx=canvas.getContext("2d");ctx.clearRect(0,0,canvas.width,canvas.height);}

function launchBurst(x,y,color){
  var count=60+Math.floor(Math.random()*40);
  for(var i=0;i<count;i++){
    var angle=Math.random()*Math.PI*2;
    var speed=2+Math.random()*8;
    var size=2+Math.random()*3;
    var life=0.7+Math.random()*0.5;
    fwParticles.push({
      x:x,y:y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-3,
      color:color,size:size,
      life:life,maxLife:life,
      gravity:0.18+Math.random()*0.1,
      trail:[],
    });
  }
}

function drawFireworks(canvas){
  var ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  fwParticles=fwParticles.filter(function(p){return p.life>0;});

  fwParticles.forEach(function(p){
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>6)p.trail.shift();

    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=p.gravity;
    p.vx*=0.98;
    p.life-=0.018;

    var alpha=Math.max(0,p.life/p.maxLife);

    // Draw trail
    if(p.trail.length>1){
      ctx.beginPath();
      ctx.moveTo(p.trail[0].x,p.trail[0].y);
      for(var i=1;i<p.trail.length;i++)ctx.lineTo(p.trail[i].x,p.trail[i].y);
      ctx.strokeStyle=p.color;
      ctx.globalAlpha=alpha*0.3;
      ctx.lineWidth=p.size*0.5;
      ctx.stroke();
    }

    // Draw particle
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.globalAlpha=alpha;
    ctx.fill();

    // Sparkle core
    if(alpha>0.6){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*0.4,0,Math.PI*2);
      ctx.fillStyle="#ffffff";
      ctx.globalAlpha=alpha*0.8;
      ctx.fill();
    }

    ctx.globalAlpha=1;
  });
}

function spinWeightedPick(){
  var total=SPIN_REWARDS.reduce(function(a,r){return a+r.weight;},0);
  var roll=Math.random()*total;
  var cum=0;
  for(var i=0;i<SPIN_REWARDS.length;i++){
    cum+=SPIN_REWARDS[i].weight;
    if(roll<cum)return i;
  }
  return 0;
}

function getSpinCountdown(){
  var now=new Date();
  var next=new Date();
  if(now.getHours()<4){
    next.setHours(4,0,0,0);
  } else {
    next.setDate(next.getDate()+1);
    next.setHours(4,0,0,0);
  }
  var diff=Math.max(0,Math.floor((next-now)/1000));
  var h=Math.floor(diff/3600);
  var m=Math.floor((diff%3600)/60);
  var s=diff%60;
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

// Canvas wheel drawing
function drawWheel(canvas, angle){
  var ctx=canvas.getContext("2d");
  var W=canvas.width, H=canvas.height;
  var cx=W/2, cy=H/2, r=cx-8;
  var n=SPIN_REWARDS.length;
  var arc=2*Math.PI/n;
  ctx.clearRect(0,0,W,H);

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx,cy,r+6,0,2*Math.PI);
  ctx.strokeStyle="#2a3a55";
  ctx.lineWidth=4;
  ctx.stroke();

  for(var i=0;i<n;i++){
    var startA=angle+i*arc;
    var endA=startA+arc;
    var reward=SPIN_REWARDS[i];

    // Slice fill
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,startA,endA);
    ctx.closePath();
    var isEven=i%2===0;
    ctx.fillStyle=isEven?"#0f1a2a":"#0a1220";
    ctx.fill();
    ctx.strokeStyle=reward.color+"44";
    ctx.lineWidth=1.5;
    ctx.stroke();

    // Colored arc edge
    ctx.beginPath();
    ctx.arc(cx,cy,r,startA,endA);
    ctx.strokeStyle=reward.color;
    ctx.lineWidth=3;
    ctx.stroke();

    // Icon text
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(startA+arc/2);
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.font="18px serif";
    ctx.fillText(reward.icon,r*0.62,0);

    // Label
    ctx.font="bold 9px 'Cinzel', serif";
    ctx.fillStyle=reward.color;
    ctx.fillText(reward.label.length>12?reward.label.slice(0,12)+"..":reward.label, r*0.34, 0);
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx,cy,28,0,2*Math.PI);
  ctx.fillStyle="#0d1220";
  ctx.fill();
  ctx.strokeStyle="#f4c842";
  ctx.lineWidth=2;
  ctx.stroke();

  // Center icon
  ctx.font="18px serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("⚔️",cx,cy);
}

window.doSpin=function(){
  if(!canSpinToday())return;
  var canvas=document.getElementById("spinCanvas");
  if(!canvas)return;

  // Pick result
  spinTargetIdx=spinWeightedPick();
  var n=SPIN_REWARDS.length;
  var arc=2*Math.PI/n;

  // Calculate target angle: spin multiple full rotations + land on target
  // Pointer is at top (angle offset = -PI/2)
  // Target slice center should end up at top
  var targetAngle=-(spinTargetIdx*arc+arc/2)-(Math.PI/2);
  var extraSpins=(5+Math.floor(Math.random()*4))*2*Math.PI;
  var finalAngle=targetAngle+extraSpins;

  var startAngle=spinAngle;
  var totalRotation=finalAngle-startAngle;
  // Normalize so we always spin forward
  while(totalRotation<4*Math.PI)totalRotation+=2*Math.PI;

  var duration=4000+Math.random()*1000; // 4-5 seconds
  var startTime=null;
  var btn=document.getElementById("spinBtn");
  if(btn)btn.disabled=true;

  function easeOut(t){return 1-Math.pow(1-t,4);}

  function animate(ts){
    if(!startTime)startTime=ts;
    var elapsed=ts-startTime;
    var progress=Math.min(1,elapsed/duration);
    var eased=easeOut(progress);
    spinAngle=startAngle+totalRotation*eased;
    drawWheel(canvas,spinAngle);

    if(progress<1){
      spinAnimFrame=requestAnimationFrame(animate);
    } else {
      // Done
      spinAngle=targetAngle%(2*Math.PI);
      drawWheel(canvas,spinAngle);
      var reward=SPIN_REWARDS[spinTargetIdx];
      reward.apply();
      G.lastSpinDate=getDayKey();
      G.spinResult=reward;
      G.spinHistory.unshift({icon:reward.icon,label:reward.label,date:new Date().toLocaleDateString(),color:reward.color});
      savePersist();
      // Show level up effect if jackpot
      if(reward.id==="jackpot")showToast("JACKPOT! 777 Gold!");
      else showToast("You won: "+reward.label+"!");
      render();
    }
  }
  spinAnimFrame=requestAnimationFrame(animate);
};

window.exportSave = function(){
  try {
    var saveData = localStorage.getItem(STORAGE_KEY);
    if(!saveData){ showToast("Nothing to export yet!"); return; }
    var blob = new Blob([saveData], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "liferp-save-" + new Date().toISOString().slice(0,10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Save exported! Keep that file safe.");
  } catch(e) {
    showToast("Export failed: " + e.message);
  }
};

window.importSave = function(){
  var input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = function(e){
    var file = e.target.files[0];
    if(!file){ return; }
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var parsed = JSON.parse(ev.target.result);
        if(!parsed || typeof parsed !== "object"){
          showToast("Invalid save file.");
          return;
        }
        // Validate it looks like a Life RPG save
        if(!parsed.skills && !parsed.gold && !parsed.log){
          showToast("This doesn't look like a Life RPG save file.");
          return;
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
        showToast("Save imported! Reloading...");
        setTimeout(function(){ location.reload(); }, 1200);
      } catch(err){
        showToast("Failed to read save file.");
      }
    };
    reader.readAsText(file);
  };
  input.click();
};

function getQuestDeadline(q){
  var now=new Date();
  var deadline=null;

  if(q.rtype==="daily"){
    // Resets at next 4AM
    var next=new Date();
    if(now.getHours()<4){next.setHours(4,0,0,0);}
    else{next.setDate(next.getDate()+1);next.setHours(4,0,0,0);}
    deadline=next;
  } else if(q.rtype==="weekly"){
    // Resets next Monday at 4AM
    var day=now.getDay(); // 0=Sun,1=Mon...
    var daysToMon=day===0?1:8-day;
    var next=new Date();
    next.setDate(now.getDate()+daysToMon);
    next.setHours(4,0,0,0);
    deadline=next;
  } else if(q.rtype==="weekend"){
    // Resets Monday 4AM
    var day=now.getDay();
    var daysToMon=day===0?1:8-day;
    var next=new Date();
    next.setDate(now.getDate()+daysToMon);
    next.setHours(4,0,0,0);
    deadline=next;
  }

  if(!deadline)return null;
  var diff=Math.max(0,Math.floor((deadline-now)/1000));
  var d=Math.floor(diff/86400);
  var h=Math.floor((diff%86400)/3600);
  var m=Math.floor((diff%3600)/60);
  var s=diff%60;

  var label="";
  if(d>0)label=d+"d "+h+"h left";
  else if(h>0)label=h+"h "+m+"m left";
  else if(m>0)label=m+"m "+s+"s left";
  else label=s+"s left";

  // Urgency color
  var color="var(--text3)";
  if(diff<3600)color="var(--danger)";       // under 1 hour — red
  else if(diff<86400)color="var(--gold)";   // under 24 hours — gold

  return{label:label,color:color,urgent:diff<3600};
}

function getWeekKey(){
  var n=new Date(),day=n.getDay();
  var mon=new Date(n);mon.setDate(n.getDate()-(day===0?6:day-1));
  return mon.toISOString().slice(0,10);
}
function getWeekendKey(){
  // Weekend starts Friday 4AM
  var n=new Date();
  var day=n.getDay(); // 0=Sun,5=Fri,6=Sat
  var fri=new Date(n);
  if(day===0)fri.setDate(n.getDate()-2);
  else if(day===6)fri.setDate(n.getDate()-1);
  else if(day===5&&n.getHours()<4)fri.setDate(n.getDate()-7);
  else{var diff=day>=5?day-5:day+2;fri.setDate(n.getDate()-diff);}
  return fri.toISOString().slice(0,10);
}
function isWeekend(){
  var day=new Date().getDay(),hour=new Date().getHours();
  return(day===5&&hour>=4)||day===6||day===0;
}

function refreshRotatingQuests(){
  var dk=getDayKey(),wk=getWeekKey(),wek=getWeekendKey();
  var rq=G.rotatingQuests||[];
  var changed=false;

  // Daily
  var daily=rq.filter(function(q){return q.rtype==="daily";});
  if(daily.length===0||daily[0].dayKey!==dk){
    rq=rq.filter(function(q){return q.rtype!=="daily";});
    var pick=DAILY_QUESTS[Math.floor(Math.random()*DAILY_QUESTS.length)];
    var nq=JSON.parse(JSON.stringify(pick));
    nq.id="daily_"+dk;nq.rtype="daily";nq.dayKey=dk;nq.done=false;nq.progress=0;
    rq.push(nq);changed=true;
  }

  // Weekly
  var weekly=rq.filter(function(q){return q.rtype==="weekly";});
  if(weekly.length===0||weekly[0].weekKey!==wk){
    rq=rq.filter(function(q){return q.rtype!=="weekly";});
    var pickW=WEEKLY_QUESTS[Math.floor(Math.random()*WEEKLY_QUESTS.length)];
    var nqW=JSON.parse(JSON.stringify(pickW));
    nqW.id="weekly_"+wk;nqW.rtype="weekly";nqW.weekKey=wk;nqW.done=false;nqW.progress=0;
    rq.push(nqW);changed=true;
  }

  // Weekend
  if(isWeekend()){
    var weekend=rq.filter(function(q){return q.rtype==="weekend";});
    if(weekend.length===0||weekend[0].weekendKey!==wek){
      rq=rq.filter(function(q){return q.rtype!=="weekend";});
      var pickWE=WEEKEND_QUESTS[Math.floor(Math.random()*WEEKEND_QUESTS.length)];
      var nqWE=JSON.parse(JSON.stringify(pickWE));
      nqWE.id="weekend_"+wek;nqWE.rtype="weekend";nqWE.weekendKey=wek;nqWE.done=false;nqWE.progress=0;
      rq.push(nqWE);changed=true;
    }
  }

  G.rotatingQuests=rq;
  if(changed)savePersist();
}

// ── Quest progress tracking ──────────────────────
function checkQuestProgress(actionId, domain){
  var allQuests=(G.quests||[]).concat(G.rotatingQuests||[]).concat(G.customQuests||[]);
  var completed=[];

  allQuests.forEach(function(q){
    if(q.done)return;
    if(!q.type||q.type==="manual")return;

    var matched=false;

    if(q.type==="count"||q.type==="streak"){
      if(q.actions&&q.actions.length>0){
        matched=q.actions.indexOf(actionId)!==-1;
      }
    } else if(q.type==="domain"){
      matched=(domain===q.domain);
    } else if(q.type==="multi"){
      // Any of the listed actions count
      if(q.actions&&q.actions.indexOf(actionId)!==-1)matched=true;
    } else if(q.type==="any"){
      matched=true;
    }

    if(matched){
      q.progress=(q.progress||0)+1;
      if(q.progress>=q.target){
        q.done=true;
        completed.push(q);
      }
    }
  });

  if(completed.length>0){
    savePersist();
    // Suppress level up popups while quest popup is showing
    // They'll fire after user clicks Claim
    G._suppressLvlUp=true;
    completed.forEach(function(q){
      setTimeout(function(){showQuestCompletePopup(q);},300);
    });
  } else if(allQuests.some(function(q){return!q.done&&q.type&&q.type!=="manual";})){
    savePersist();
  }
}

function showQuestCompletePopup(q){
  var sk=skById(q.skill);
  var color=sk?sk.color:"#f4c842";
  var chestLine=q.chest?'<div style="font-size:13px;color:var(--text2);margin-bottom:12px;">+1 '+q.chest+' chest added to Inventory</div>':"";

  // Award gold + XP directly WITHOUT triggering level up popup yet
  // Level up popups will fire after user clicks Claim
  G.gold+=(q.gold||0);
  G.totalXP=(G.totalXP||0)+q.xp;
  G.log.unshift({label:"Quest: "+q.title,xp:q.xp,gold:q.gold||0,time:new Date().toLocaleTimeString(),date:new Date().toLocaleDateString(),skillId:q.skill||"discipline"});
  // Apply XP to skill silently, collect any level ups
  var skillId=q.skill||"discipline";
  var sk2=G.skills[skillId];
  var nx=sk2.xp+q.xp,nl=sk2.level,lvUps=[];
  while(nx>=xpForSkillLv(nl)){nx-=xpForSkillLv(nl);nl++;lvUps.push({skill:skById(skillId),level:nl});}
  G.skills[skillId]={xp:nx,level:nl};
  if(q.chest){
    var ck=q.chest==="legendary"?"legendaryChests":q.chest==="rare"?"rareChests":"chests";
    G[ck]=(G[ck]||0)+1;
  }
  // Award gems based on quest type
  var gemsToAward=0;
  if(q.gemReward){gemsToAward=q.gemReward;}
  else if(q.rtype==="weekly"||q.rtype==="weekend"){gemsToAward=1;}
  else if(!q.rtype&&!q.isCustom){gemsToAward=2;}
  if(gemsToAward>0){G.gems=(G.gems||0)+gemsToAward;showToast("+"+gemsToAward+" 💎 earned!");}
  savePersist();
  render();
  // Store pending level ups to show AFTER quest popup is claimed
  G._pendingLvUps=(G._pendingLvUps||[]).concat(lvUps);

  var container=document.createElement("div");
  container.className="qc-popup-bg";
  container.id="qcPopup";
  container.innerHTML=
    '<div class="qc-popup" style="border:1px solid '+color+'44;">'+
      '<div class="qc-icon">🏆</div>'+
      '<div class="qc-title">Quest Complete!</div>'+
      '<div class="qc-name">'+q.title+'</div>'+
      '<div class="qc-rewards">'+
        '<div class="qc-reward"><div class="qc-reward-val" style="color:'+color+';">+'+q.xp+'</div><div class="qc-reward-lbl">XP</div></div>'+
        '<div class="qc-reward"><div class="qc-reward-val" style="color:var(--gold);">+'+(q.gold||0)+'</div><div class="qc-reward-lbl">Gold</div></div>'+
      '</div>'+
      chestLine+
      '<button class="qc-close" onclick="closeQCPopup()">Claim ✓</button>'+
    '</div>';
  document.body.appendChild(container);
  stopFireworksForce();
  startFireworks(color);
  // Stops when user clicks Claim
}

window.closeQCPopup=function(){
  var el=document.getElementById("qcPopup");
  if(el)el.remove();
  stopFireworksForce();
  G._suppressLvlUp=false;
  // Now show any level ups queued during this quest

  if(acc.reqLevel&&totalLv()>=acc.reqLevel)return true;
  if(acc.reqStreak&&(G.streakDays||0)>=acc.reqStreak)return true;
  return false;

  if(!G.unlockedClasses)G.unlockedClasses=[0,1,2,3,4,5];

    G.lastClassChange=Date.now();

    showToast("Unlocked: "+cls.name+"! Equip it after your 7-day lock expires.");

  render();

};

function rotPoolById(id){return ROT_POOL.filter(function(r){return r.id===id;})[0];}

function initRotatingSlots(){
  var slots=G.rotatingSlots||[];
  var now=Date.now();
  // Refresh expired slots
  while(slots.length<2){slots.push(newRotSlot(slots));}
  slots=slots.map(function(s){
    if(now>=s.expiresAt){return newRotSlot(slots);}
    return s;
  });
  // Make sure slots have different items
  if(slots.length>=2&&slots[0].itemId===slots[1].itemId){
    slots[1]=newRotSlot([slots[0]]);
  }
  G.rotatingSlots=slots;
  savePersist();
}

function newRotSlot(existing){
  var usedIds=(existing||[]).map(function(s){return s.itemId;});
  var available=ROT_POOL.filter(function(r){return usedIds.indexOf(r.id)===-1;});
  var item=available[Math.floor(Math.random()*available.length)];
  var duration=item.dur();
  // Cap at 3 days
  duration=Math.min(duration,3*24*3600000);
  return{itemId:item.id,expiresAt:Date.now()+duration,purchased:false};
}

function getRotTimeLeft(slot){
  var diff=Math.max(0,slot.expiresAt-Date.now());
  var h=Math.floor(diff/3600000);
  var m=Math.floor((diff%3600000)/60000);
  var urgent=diff<3600000;
  var label=h>0?h+"h "+m+"m left":m+"m left";
  return{label:label,urgent:urgent};
}

function rRotShop(){
  initRotatingSlots();
  var slotsHTML=G.rotatingSlots.map(function(slot,idx){
    var item=rotPoolById(slot.itemId);
    if(!item)return"";
    var tl=getRotTimeLeft(slot);
    var tierLabel=item.tier===1?"Gold":item.tier===2?"Gold + Gems":"Gems Only";
    var canAfford=(G.gold>=item.gold)&&(G.gems>=item.gems);
    var costHTML="";
    if(item.gold>0)costHTML+='<span class="rot-cost-gold">'+item.gold+'g</span>';
    if(item.gems>0)costHTML+='<span class="rot-cost-gems">'+item.gems+'💎</span>';
    return'<div class="rot-slot tier'+item.tier+'">'+
      '<div class="rot-slot-badge">'+tierLabel+'</div>'+
      '<div class="rot-icon">'+item.icon+'</div>'+
      '<div class="rot-name">'+item.name+'</div>'+
      '<div class="rot-desc">'+item.desc+'</div>'+
      '<div class="rot-cost">'+costHTML+'</div>'+
      (slot.purchased
        ?'<div style="font-size:11px;color:var(--success);font-family:"Cinzel",serif;">✓ Purchased</div>'
        :'<button class="rot-buy-btn tier'+item.tier+'" onclick="buyRotItem('+idx+')" '+(canAfford?"":"disabled")+'>'+
          (canAfford?"Buy Now":"Not enough "+(G.gold<item.gold?"Gold":"Gems"))+
        '</button>')+
      '<div class="rot-timer'+(tl.urgent?" urgent":"")+'">⏰ '+tl.label+'</div>'+
    '</div>';
  }).join("");

  return slotsHTML;
}

window.buyRotItem=function(slotIdx){
  initRotatingSlots();
  var slot=G.rotatingSlots[slotIdx];
  if(!slot||slot.purchased)return;
  var item=rotPoolById(slot.itemId);
  if(!item)return;
  if(G.gold<item.gold||G.gems<item.gems){
    showToast("Not enough "+(G.gold<item.gold?"Gold":"Gems")+"!");return;
  }
  G.gold-=item.gold;
  G.gems-=item.gems;
  slot.purchased=true;
  item.apply();
  savePersist();render();
};

// Rotating slot countdown ticker
var rotTicker=null;
function startRotTicker(){
  if(rotTicker)clearInterval(rotTicker);
  rotTicker=setInterval(function(){
    if(G.tab!=="shop"){clearInterval(rotTicker);rotTicker=null;return;}
    // Check if any slot expired
    var now=Date.now();
    var changed=false;
    (G.rotatingSlots||[]).forEach(function(s){if(now>=s.expiresAt){changed=true;}});
    if(changed){initRotatingSlots();}
    render();
  },30000); // check every 30s
}

function getActivePetData(slotIdx){
  var petUid=G.activePets[slotIdx];
  if(!petUid)return null;
  var pet=(G.ownedPets||[]).filter(function(p){return p.id===petUid;})[0];
  if(!pet)return null;
  return PET_DATA[pet.petId]?Object.assign({},PET_DATA[pet.petId],{uid:pet.id,petId:pet.petId}):null;
}

function isPetActive(uid){
  return(G.activePets||[]).indexOf(uid)!==-1;
}

function isSlotLocked(slotIdx){
  var cd=(G.slotCooldowns||[])[slotIdx];
  return cd&&Date.now()<cd;
}

function getSlotCooldownLabel(slotIdx){
  var cd=(G.slotCooldowns||[])[slotIdx];
  if(!cd||Date.now()>=cd)return null;
  var diff=cd-Date.now();
  var h=Math.floor(diff/3600000);
  var m=Math.floor((diff%3600000)/60000);
  return h>0?h+"h "+m+"m":m+"m left";
}

function canEvolve(){
  var owned=G.ownedPets||[];
  var counts={};
  owned.forEach(function(p){if(!p.evolved){counts[p.petId]=(counts[p.petId]||0)+1;}});
  return Object.keys(counts).filter(function(k){return counts[k]>=2;});
}

function applyPetBonus(baseXP, baseGold, domain){
  var xp=baseXP, gold=baseGold;
  for(var i=0;i<2;i++){
    var pet=getActivePetData(i);
    if(!pet)continue;
    if(pet.petId==="dog"||pet.petId==="guardian_dog"){
      gold+=pet.petId==="guardian_dog"?6:3;
    }
    if(pet.petId==="wolf"&&domain==="Health")xp=Math.round(xp*1.08);
    if(pet.petId==="shadow_wolf"&&domain==="Health")xp=Math.round(xp*1.18);
    if(pet.petId==="owl"&&domain==="Learning")xp=Math.round(xp*1.08);
    if(pet.petId==="star_owl"&&domain==="Learning")xp=Math.round(xp*1.18);
    if(pet.petId==="dragon"&&domain==="Productivity")xp=Math.round(xp*1.08);
    if(pet.petId==="inferno_dragon"&&domain==="Productivity")xp=Math.round(xp*1.18);
    if(pet.petId==="butterfly"&&domain==="Spiritual")xp=Math.round(xp*1.08);
    if(pet.petId==="soul_butterfly"&&domain==="Spiritual")xp=Math.round(xp*1.18);
  }
  return{xp:xp,gold:gold};
}

function checkOrbBonus(){
  // Spirit Orb: every 5th action gives free chest
  for(var i=0;i<2;i++){
    var pet=getActivePetData(i);
    if(!pet)continue;
    if(pet.petId==="orb"||pet.petId==="void_orb"){
      G.actionCount=(G.actionCount||0)+1;
      if(G.actionCount%5===0){
        if(pet.petId==="void_orb"){G.rareChests=(G.rareChests||0)+1;G.totalChestsEarned=(G.totalChestsEarned||0)+1;showToast("💫 Void Orb: free Rare Chest!");}
        else{G.chests=(G.chests||0)+1;showToast("🔮 Spirit Orb: free Common Chest!");}
      }
      break;
    }
  }
}

function checkInfernoDragonGem(actionId){
  if(actionId!=="deep_work")return;
  for(var i=0;i<2;i++){
    var pet=getActivePetData(i);
    if(pet&&pet.petId==="inferno_dragon"){G.gems=(G.gems||0)+1;showToast("🔥 Inferno Dragon: +1💎!");}
  }
}

function checkWeeklyPetKey(){
  // Guardian Dog: free key once per week
  var wk=getWeekKey();
  if(G._lastPetKeyWeek===wk)return;
  for(var i=0;i<2;i++){
    var pet=getActivePetData(i);
    if(pet&&pet.petId==="guardian_dog"){
      G.keys=(G.keys||0)+1;
      G._lastPetKeyWeek=wk;
      showToast("🐕‍🦺 Guardian Dog: free key this week!");
      savePersist();break;
    }
  }
}

window.openPetPicker=function(slotIdx){
  if(isSlotLocked(slotIdx)){showToast("Slot locked for "+getSlotCooldownLabel(slotIdx)+"!");return;}
  G._pickingSlot=slotIdx;
  render();
};

window.closePetPicker=function(){
  G._pickingSlot=null;
  render();
};

window.assignPet=function(uid){
  var slotIdx=G._pickingSlot;
  if(slotIdx===null||slotIdx===undefined)return;
  if(isSlotLocked(slotIdx)){showToast("Slot is locked!");return;}
  // Unassign from other slot if already active
  var other=G.activePets[slotIdx===0?1:0];
  if(uid===other){showToast("Pet already in other slot!");return;}
  // Apply cooldown to this slot
  if(!G.slotCooldowns)G.slotCooldowns=[null,null];
  if(G.activePets[slotIdx]!==null){
    G.slotCooldowns[slotIdx]=Date.now()+(24*3600000);
  }
  G.activePets[slotIdx]=uid;
  G._pickingSlot=null;
  var pet=(G.ownedPets||[]).filter(function(p){return p.id===uid;})[0];
  var pd=pet?PET_DATA[pet.petId]:null;
  showToast((pd?pd.icon:"🐾")+" "+(pd?pd.name:"Pet")+" activated in slot "+(slotIdx+1)+"!");
  savePersist();render();
};

window.removePet=function(slotIdx){
  if(isSlotLocked(slotIdx)){showToast("Slot locked for "+getSlotCooldownLabel(slotIdx)+"!");return;}
  if(!G.slotCooldowns)G.slotCooldowns=[null,null];
  if(G.activePets[slotIdx]!==null){
    G.slotCooldowns[slotIdx]=Date.now()+(24*3600000);
  }
  G.activePets[slotIdx]=null;
  savePersist();render();
};

window.evolvePets=function(petId){
  var owned=G.ownedPets||[];
  var pair=owned.filter(function(p){return p.petId===petId&&!p.evolved;}).slice(0,2);
  if(pair.length<2){showToast("Need 2 of the same pet to evolve!");return;}
  var evolvedId=EVOLVE_MAP[petId];
  if(!evolvedId){showToast("No evolution found!");return;}
  var ePet=PET_DATA[evolvedId];
  // Remove both base pets
  var removed=0;
  G.ownedPets=owned.filter(function(p){
    if(p.petId===petId&&!p.evolved&&removed<2){removed++;return false;}
    return true;
  });
  // Remove from active slots if either was active
  for(var i=0;i<2;i++){
    if(pair.some(function(p){return p.id===G.activePets[i];})){
      G.activePets[i]=null;
      G.slotCooldowns[i]=null;
    }
  }
  // Add evolved pet
  var newPet={id:Date.now(),petId:evolvedId,name:ePet.name,icon:ePet.icon,evolved:true};
  G.ownedPets.push(newPet);
  savePersist();
  showToast(ePet.icon+" Evolution! "+ePet.name+" has awakened!");
  render();
};

function rPets(){
  var owned=G.ownedPets||[];
  var evolvable=canEvolve();

  // Active slots
  var slotsHTML='<div class="pet-stable-title">Active Pets</div><div class="pet-active-slots">';
  for(var i=0;i<2;i++){
    var pet=getActivePetData(i);
    var locked=isSlotLocked(i);

      slotsHTML+='<div class="pet-slot filled'+(pet.evolved?" evolved":"")+(locked?" locked":"")+'">'+

      slotsHTML+='<div class="pet-slot empty" onclick="'+(locked?'':' openPetPicker('+i+')')+'">'+
        '<div class="pet-slot-icon" style="opacity:.3;">🐾</div>'+
        (locked
          ?'<div class="pet-slot-cooldown">🔒 '+cdLabel+'</div>'
          :'<div class="pet-slot-empty-text">Tap to assign a pet</div>')+
      '</div>';
    }
  }
  slotsHTML+='</div>';

  // Evolution section
  var evolveHTML="";
  if(evolvable.length>0){
    evolveHTML='<div class="pet-evolve-section">';
    evolvable.forEach(function(petId){
      var base=PET_DATA[petId];
      var evolved=PET_DATA[EVOLVE_MAP[petId]];
      evolveHTML+=
        '<div class="pet-evolve-title">✨ Evolution Available!</div>'+
        '<div class="pet-evolve-desc">'+base.icon+' '+base.name+' × 2 → '+evolved.icon+' '+evolved.name+'</div>'+
        '<div style="font-size:11px;color:var(--success);margin-bottom:12px;">'+evolved.bonus+'</div>'+
        '<button class="pet-evolve-btn" onclick="evolvePets(\''+petId+'\')">Evolve Now ✨</button>';
    });
    evolveHTML+='</div>';
  }

  // Stable
  var stableHTML='<div class="pet-stable-title">Your Stable — '+owned.length+' pet'+(owned.length!==1?"s":"")+'</div>';
  if(owned.length===0){
    stableHTML+='<div class="empty">No pets yet. Buy your first companion in the Shop!</div>';
  } else {
    stableHTML+='<div class="pet-stable-grid">';
    owned.forEach(function(p){
      var pd=PET_DATA[p.petId];
      if(!pd)return;
      var isActive=isPetActive(p.id);
      stableHTML+='<div class="pet-card'+(isActive?" active-pet":"")+(p.evolved?" evolved-pet":"")+'">'+
        (isActive?'<div class="pet-active-badge">Active</div>':'')+
        '<div class="pet-card-icon">'+pd.icon+'</div>'+
        '<div class="pet-card-name">'+pd.name+'</div>'+
        '<div class="pet-card-bonus">'+pd.bonus+'</div>'+
      '</div>';
    });
    stableHTML+='</div>';
  }

  // Pet picker modal
  var pickerHTML="";
  if(G._pickingSlot!==null&&G._pickingSlot!==undefined){
    var available=owned.filter(function(p){
      var otherSlot=G._pickingSlot===0?1:0;
      return G.activePets[otherSlot]!==p.id;
    });
    var pickerCards=available.map(function(p){
      var pd=PET_DATA[p.petId];if(!pd)return"";
      var isActive=isPetActive(p.id);
      return'<div class="pet-card'+(isActive?" active-pet":"")+(p.evolved?" evolved-pet":"")+'" onclick="assignPet('+p.id+')">'+
        '<div class="pet-card-icon">'+pd.icon+'</div>'+
        '<div class="pet-card-name">'+pd.name+'</div>'+
        '<div class="pet-card-bonus">'+pd.bonus+'</div>'+
      '</div>';
    }).join("");
    pickerHTML='<div class="pet-picker-bg" onclick="if(event.target.classList.contains(&quot;pet-picker-bg&quot;))closePetPicker()">'+
      '<div class="pet-picker">'+
        '<div class="pet-picker-title">Choose Pet for Slot '+(G._pickingSlot+1)+'</div>'+
        '<div class="pet-picker-sub">Select a companion to activate.</div>'+
        (available.length>0
          ?'<div class="pet-picker-grid">'+pickerCards+'</div>'
          :'<div class="empty" style="margin-bottom:12px;">No pets available. Buy one in the Shop!</div>')+
        '<button class="pet-picker-close" onclick="closePetPicker()">Cancel</button>'+
      '</div>'+
    '</div>';
  }

  return slotsHTML+evolveHTML+stableHTML+pickerHTML;
}

function applyClassBonus(xp, gold, domain, streakDays){
  var cls=G.avatarClass||0;
  var streak=streakDays||G.streakDays||0;
  if(cls===0&&domain==="Health")   xp=Math.round(xp*1.10);
  if(cls===1&&domain==="Learning") xp=Math.round(xp*1.10);
  if(cls===2&&domain==="Productivity") xp=Math.round(xp*1.10);
  if(cls===3) gold=Math.round(gold*1.10);
  if(cls===4&&streak>0) xp=Math.round(xp*1.10);
  if(cls===5&&domain==="Spiritual") xp=Math.round(xp*1.10);
  if(cls===7&&streak>=7) xp=Math.round(xp*1.15);
  if(cls===8&&(domain==="Spiritual"||domain==="Learning")) xp=Math.round(xp*1.10);
  return{xp:xp,gold:gold};
}

var _manualLoginDone=false;

// Smart merge — keep whichever save has more progress
function smartMerge(localG, cloudSave){
  if(!cloudSave)return localG;
  var localXP=localG.totalXP||0;
  var cloudXP=cloudSave.totalXP||0;
  var localGold=localG.gold||0;
  var cloudGold=cloudSave.gold||0;
  // If local has significantly more progress, ask player which to keep
  var localScore=localXP+localGold;
  var cloudScore=cloudXP+cloudGold;
  if(localScore>cloudScore+100){
    // Local is ahead — return local data merged with cloud auth fields
    var merged=Object.assign({},localG);
    merged._syncUser=cloudSave._syncUser||localG._syncUser;
    merged._syncEmail=cloudSave._syncEmail||localG._syncEmail;
    return{data:merged,usedLocal:true,localXP:localXP,cloudXP:cloudXP};
  }
  // Cloud wins or roughly equal
  return{data:cloudSave,usedLocal:false,localXP:localXP,cloudXP:cloudXP};
}

window.obDoRestore=async function(){
  var email=document.getElementById("obRestoreEmail").value.trim().toLowerCase();
  var pass=document.getElementById("obRestorePass").value;
  var msg=document.getElementById("obRestoreMsg");
  if(!email||!pass){msg.textContent="Enter your email and password.";msg.className="sync-status err";return;}
  msg.textContent="Logging in...";msg.className="sync-status";
  var result=await sbSignIn(email,pass);
  if(result.error||result.error_code){
    msg.textContent=result.error_description||result.error&&result.error.message||result.msg||"Wrong email or password. Please try again.";
    msg.className="sync-status err";
    return;
  }
  if(result.access_token){
    _sbSession=result;
    localStorage.setItem("sb_session",JSON.stringify(result));
    msg.textContent="Loading your progress...";msg.className="sync-status";
    var cloudSave=await loadSaveFromCloud();
    if(cloudSave){
      var merge=smartMerge(G,cloudSave);
      if(merge.usedLocal&&merge.cloudXP>0){
        // Local is ahead of cloud — ask player which to keep
        var el2=document.getElementById("ob-container");
        if(el2)el2.remove();
        showMergeConflict(merge,result,email);
        return;
      }
      Object.keys(merge.data).forEach(function(k){G[k]=merge.data[k];});
      G._syncUser=result.user.id;
      G._syncEmail=email;
      G.onboarded=true;
      _manualLoginDone=true;
      var stale=document.getElementById("dcPicker");
      if(stale)stale.remove();
      localStorage.setItem(STORAGE_KEY,JSON.stringify(buildSaveObj()));
      var el=document.getElementById("ob-container");
      if(el)el.remove();
      render();
      if(!G.dailyChallenge&&G.dcOptions&&G.dcOptions.length){setTimeout(showDCPicker,60000);}
      showToast(merge.usedLocal?"✓ Logged in! Your local progress is ahead — keeping it.":"✓ Progress restored! Welcome back.");
    } else {
      // No cloud save found — still log them in but warn
      G._syncUser=result.user.id;
      G._syncEmail=email;
      G.onboarded=true;
      localStorage.setItem(STORAGE_KEY,JSON.stringify(buildSaveObj()));
      var el=document.getElementById("ob-container");
      if(el)el.remove();
      render();
      showToast("⚠ Logged in but no cloud save found. Play on your main device first.");
    }
  } else {
    msg.textContent="Wrong email or password. Please try again.";
    msg.className="sync-status err";
  }
};

function showMergeConflict(merge, sessionResult, email){
  var div=document.createElement("div");
  div.id="mergeConflict";
  div.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:20000;display:flex;align-items:center;justify-content:center;padding:24px;";
  div.innerHTML=

      '<div style="font-size:40px;margin-bottom:12px;">⚔️</div>'+
      '<div style="font-family:\"Cinzel\",serif;font-size:16px;color:#f4c842;margin-bottom:8px;">Save Conflict</div>'+
      '<div style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;">Your local progress is ahead of your cloud save.<br><br>'+
        '<span style="color:#e8d5a0;">Local:</span> '+merge.localXP+' XP<br>'+
        '<span style="color:#e8d5a0;">Cloud:</span> '+merge.cloudXP+' XP</div>'+
      '<button onclick="useMergeLocal()" style="background:linear-gradient(135deg,#c8a830,#f4c842);border:none;border-radius:12px;padding:13px;font-family:\"Cinzel\",serif;font-size:12px;font-weight:700;color:#1a1200;cursor:pointer;width:100%;margin-bottom:10px;">Keep Local Progress</button>'+
      '<button onclick="useMergeCloud()" style="background:transparent;border:1px solid var(--border2);border-radius:12px;padding:11px;font-family:\"Cinzel\",serif;font-size:12px;color:var(--text2);cursor:pointer;width:100%;">Use Cloud Save</button>'+

  div._sessionResult=sessionResult;
  div._email=email;
  div._merge=merge;
}

window.useMergeLocal=function(){
  var div=document.getElementById("mergeConflict");
  if(!div)return;
  var merge=div._merge;var sessionResult=div._sessionResult;var email=div._email;
  div.remove();
  Object.keys(merge.data).forEach(function(k){G[k]=merge.data[k];});
  G._syncUser=sessionResult.user.id;G._syncEmail=email;G.onboarded=true;_manualLoginDone=true;
  _sbSession=sessionResult;localStorage.setItem("sb_session",JSON.stringify(sessionResult));
  localStorage.setItem(STORAGE_KEY,JSON.stringify(buildSaveObj()));
  _lastSyncedData=null;syncSave();
  render();showToast("✓ Local progress kept and synced to cloud!");
};

window.useMergeCloud=function(){
  var div=document.getElementById("mergeConflict");
  if(!div)return;
  var sessionResult=div._sessionResult;var email=div._email;
  div.remove();
  loadSaveFromCloud().then(function(cloudSave){
    if(cloudSave)Object.keys(cloudSave).forEach(function(k){G[k]=cloudSave[k];});
    G._syncUser=sessionResult.user.id;G._syncEmail=email;G.onboarded=true;_manualLoginDone=true;
    _sbSession=sessionResult;localStorage.setItem("sb_session",JSON.stringify(sessionResult));
    localStorage.setItem(STORAGE_KEY,JSON.stringify(buildSaveObj()));
    render();showToast("✓ Cloud save restored!");
  });
};

window.checkPassStrength=function(){
  var pass=document.getElementById("obSyncPass");
  if(!pass)return;
  var v=pass.value;
  function set(id,ok,text){
    var el=document.getElementById(id);
    if(!el)return;
    el.style.color=ok?"#2ab88a":"var(--text3)";
    el.textContent=(ok?"✓ ":"✗ ")+text;
  }
  set("pc1",v.length>=8,"At least 8 characters");
  set("pc2",/[A-Z]/.test(v),"One uppercase letter (A-Z)");
  set("pc3",/[a-z]/.test(v),"One lowercase letter (a-z)");
  set("pc4",/[0-9]/.test(v),"One number (0-9)");
  set("pc5",/[^A-Za-z0-9]/.test(v),"One special character (!@#$%)");
};

function validatePassword(pass){
  if(pass.length<8)return"Password must be at least 8 characters.";
  if(!/[A-Z]/.test(pass))return"Add an uppercase letter (A-Z).";
  if(!/[a-z]/.test(pass))return"Add a lowercase letter (a-z).";
  if(!/[0-9]/.test(pass))return"Add a number (0-9).";
  if(!/[^A-Za-z0-9]/.test(pass))return"Add a special character (!@#$%).";
  return null;
}

window.obCreateAccount=async function(){
  var email=document.getElementById("obEmail").value.trim().toLowerCase();
  var pass=document.getElementById("obSyncPass").value;
  if(!email||!email.includes("@")){showToast("Enter a valid email address.");return;}
  var passErr=validatePassword(pass);
  if(passErr){showToast(passErr);return;}
  var msg=document.getElementById("obAccountMsg");
  if(msg)msg.textContent="Creating account..."; if(msg)msg.className="sync-status";
  var result=await sbSignUp(email,pass);
  console.log("Signup result:", JSON.stringify(result));
  if(result.error||result.code){
    var errMsg=result.error&&result.error.message||result.msg||result.message||"Error creating account.";
    if(msg){msg.textContent=errMsg;msg.className="sync-status err";} return;
  }
  // Email confirmation required — user created but no session yet
  if(result.user||result.id){
    G._syncEmail=email; savePersist();
    if(msg){msg.textContent="✓ Account created!";msg.className="sync-status ok";}
    setTimeout(function(){G._obStep=5;renderOnboarding();},1500);
  } else {
    if(msg){msg.textContent="Something went wrong. Please try again.";msg.className="sync-status err";}
    console.log("Unexpected result:", result);
  }
};

window.obFinish=function(){
  G.onboarded=true;

  G.lastClassChange=Date.now(); // start 7-day lock from onboarding choice
  var el=document.getElementById("ob-container");

  savePersist();
  render();
};

function getTimePlayed(){
  // Estimate from first log entry date or creation date
  var log=G.log||[];
  if(log.length===0)return"Just started";
  // Count unique day keys from log
  var days=new Set();
  log.forEach(function(e){if(e.date)days.add(e.date);});
  var d=days.size;
  if(d===0)return"Day 1";
  if(d===1)return"1 day";
  return d+" days";
}

function getTotalActionsLogged(){
  return(G.log||[]).filter(function(e){return!e.label||!e.label.startsWith("Quest:");}).length;
}

function getTotalQuestsCompleted(){
  var main=(G.quests||[]).filter(function(q){return q.done;}).length;
  var custom=(G.customQuests||[]).filter(function(q){return q.done;}).length;
  return Math.max(main+custom, G.totalQuestsDone||0);
}

function getTotalGoldEarned(){
  return(G.log||[]).reduce(function(sum,e){return sum+(e.gold||0);},0);
}

function getTopSkill(){
  var top=null,topLv=0;
  SKILLS.forEach(function(sk){
    var s=G.skills[sk.id]||(G.skills[sk.id]={xp:0,level:1});
    if(s.level>topLv){topLv=s.level;top=sk;}
  });
  return top;
}

function getEarnedTitles(){
  var titles=[];
  // From inventory
  (G.inventory||[]).forEach(function(t){
    if(typeof t==="string"&&["The Relentless","Seeker of Truth","Awakened"].includes(t)){
      titles.push(t);
    }
  });
  // From quests
  (G.quests||[]).forEach(function(q){
    if(q.done&&q.title)titles.push(q.title);
  });
  return titles.slice(0,6);
}

function getDCKey(){return getDayKey();}

function initDailyChallenge(){
  var dk=getDCKey();
  if(G.lastDCKey===dk){
    // Same day — if player hasn't picked yet, show picker after 60s
    if(!G.dailyChallenge&&G.dcOptions&&G.dcOptions.length){
      setTimeout(showDCPicker,60000);

  }
  // New day — generate 3 fresh options, show after 60s

function updateDCProgress(actionId, domain){
  var dc=G.dailyChallenge;
  if(!dc||G.dcClaimed)return;
  var dk=getDCKey();
  if(G.lastDCKey!==dk)return;
  var hit=false;
  if(dc.type==="domain"&&domain===dc.domain)hit=true;
  if(dc.type==="count")hit=true;
  if(dc.type==="action"&&actionId===dc.action)hit=true;
  if(hit){
    G.dcProgress=Math.min((G.dcProgress||0)+1,dc.target);
    if(G.dcProgress>=dc.target&&!G.dcClaimed){
      G.dcClaimed=true;
      claimDC(dc);
    }
    savePersist();
  }
}

// HANDLE AUTH REDIRECT (email confirm + password reset)
// ════════════════════════════════════════════════
async function handleAuthRedirect(){
  // Check both hash (#) and query string (?) for tokens
  var hash=window.location.hash;
  var search=window.location.search;
  var raw=(hash||"").replace(/^#/,"")+"&"+(search||"").replace(/^\?/,"");
  if(raw.indexOf("access_token")===-1&&raw.indexOf("token_hash")===-1&&raw.indexOf("type")===-1)return false;
  // Parse all params
  var params={};
  raw.split("&").forEach(function(p){
    var kv=p.split("=");if(kv[0])params[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||"");
  });
  var type=params["type"];
  var accessToken=params["access_token"];
  var refreshToken=params["refresh_token"];
  var tokenHash=params["token_hash"];
  // Clear URL without triggering reload
  history.replaceState(null,"",window.location.pathname);

  if(!accessToken&&tokenHash){
    // Verify token_hash to get a real session (works for both signup and recovery)
    try{
      var vresp=await fetch(SB_URL+"/auth/v1/verify",{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SB_KEY},
        body:JSON.stringify({token_hash:tokenHash,type:type==="recovery"?"recovery":"signup"})
      });
      if(vresp.ok){var vdata=await vresp.json();if(vdata.access_token){accessToken=vdata.access_token;refreshToken=vdata.refresh_token;}}
    }catch(e){}
  }

  if(type==="recovery"){
    if(accessToken){showPasswordRecoveryModal(accessToken);return true;}
    return false;
  }

  if(!accessToken)return false;
  // type === "signup" or "magiclink" — auto login with access token
  try{
    showToast("Confirming... token found");
    // Try refresh flow first if we have a refresh token
    if(refreshToken){
      var resp=await fetch(SB_URL+"/auth/v1/token?grant_type=refresh_token",{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SB_KEY},
        body:JSON.stringify({refresh_token:refreshToken})
      });
      if(resp.ok){
        var data=await resp.json();
        if(data.access_token){
          _sbSession=data;
          localStorage.setItem("sb_session",JSON.stringify(data));
          var cloudSave=await loadSaveFromCloud();
          if(cloudSave){Object.keys(cloudSave).forEach(function(k){G[k]=cloudSave[k];});}
          G._syncUser=data.user.id;
          G._syncEmail=data.user.email||"";
          G.onboarded=true;
          savePersist();
          showToast("✓ Email confirmed! You are now logged in.");
          return true;
        }
      }
    }
    // Fall back to using access token directly
    showToast("Trying direct token...");
    _sbSession={access_token:accessToken,refresh_token:refreshToken||""};
    // Get user info
    var uresp=await fetch(SB_URL+"/auth/v1/user",{
      headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+accessToken}
    });
    showToast("User fetch: "+uresp.status);
    if(uresp.ok){
      var udata=await uresp.json();
      _sbSession.user=udata;
      localStorage.setItem("sb_session",JSON.stringify(_sbSession));
      var cloudSave=await loadSaveFromCloud();
      if(cloudSave){Object.keys(cloudSave).forEach(function(k){G[k]=cloudSave[k];});}
      G._syncUser=udata.id;
      G._syncEmail=udata.email||"";
      G.onboarded=true;
      savePersist();
      showToast("✓ Email confirmed! You are now logged in.");
      return true;
    }
  }catch(e){showToast("Error: "+e.message);}
  return false;
}

window.doPasswordRecovery=async function(accessToken){
  var p1=document.getElementById("recPass1").value;
  var p2=document.getElementById("recPass2").value;
  var msg=document.getElementById("recMsg");
  if(!p1||p1!==p2){msg.textContent="Passwords do not match.";msg.className="recovery-status err";return;}
  var err=validatePassword(p1);
  if(err){msg.textContent=err;msg.className="recovery-status err";return;}
  msg.textContent="Updating...";msg.className="recovery-status";
  try{
    // If not a JWT (no dots), it's a token_hash — verify it first to get a real session
    var realToken=accessToken;
    if(accessToken.split(".").length!==3){
      var vresp=await fetch(SB_URL+"/auth/v1/verify",{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SB_KEY},
        body:JSON.stringify({token_hash:accessToken,type:"recovery"})
      });
      var vdata=await vresp.json();
      if(!vresp.ok||!vdata.access_token){
        msg.textContent=vdata.error_description||vdata.msg||"Invalid or expired link. Request a new one.";
        msg.className="recovery-status err";return;
      }
      realToken=vdata.access_token;
    }
    var resp=await fetch(SB_URL+"/auth/v1/user",{
      method:"PUT",
      headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+realToken},
      body:JSON.stringify({password:p1})
    });
    var data=await resp.json();
    if(resp.ok&&data.id){
      msg.textContent="✓ Password updated! You can now log in.";msg.className="recovery-status ok";
      setTimeout(function(){
        var el=document.getElementById("recoveryModal");
        if(el)el.remove();
        if(!G.onboarded){G._obStep=0;renderOnboarding();setTimeout(function(){obRestoreAccount();},100);}
      },2000);
    } else {
      msg.textContent=(data.message||data.msg||"Error updating password. Try again.");
      msg.className="recovery-status err";
    }
  }catch(e){
    msg.textContent="Network error. Please try again.";
    msg.className="recovery-status err";
  }
};

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").then(function(reg){
    reg.addEventListener("updatefound", function(){
      var newWorker=reg.installing;
      newWorker.addEventListener("statechange", function(){
        if(newWorker.state==="installed"&&navigator.serviceWorker.controller){
          // New version available
          showUpdateBanner();
        }
      });
    });
  }).catch(function(){});
  // Check for updates when page gains focus
  document.addEventListener("visibilitychange", function(){
    if(!document.hidden){
      navigator.serviceWorker.getRegistration().then(function(reg){
        if(reg)reg.update();
      });
    }
  });
}
checkStreakShield();
refreshRotatingQuests();
checkWeeklyPetKey();
// Handle email confirmation and password reset links first
handleAuthRedirect().then(async function(wasRedirect){
  if(!wasRedirect){
    // Only try session restore if not coming from email link
    var restored=await tryRestoreSession();
    if(restored&&_sbSession&&!_manualLoginDone){
      G._syncUser=_sbSession.user.id;
      var cloudSave=await loadSaveFromCloud();
      if(cloudSave){
        Object.keys(cloudSave).forEach(function(k){G[k]=cloudSave[k];});
        var stale=document.getElementById("dcPicker");
        if(stale)stale.remove();
      }
      savePersist();
    }
  }
  initDailyChallenge();
  checkLoginStreak();
  checkLoginNag();
  checkWhatsNew();
  resetTodoClaim();
  startSuddenEventTimer();
  if(!G.onboarded&&!wasRedirect){
    G._obStep=0;
    G._obClass=G.avatarClass||0;
    setTimeout(function(){
      renderOnboarding();
      // If player has logged in before, go straight to login screen
      if(G._syncEmail){
        setTimeout(function(){obRestoreAccount();},100);
      }
    },300);
  }
  G._lastTotalLv=totalLv();
  render();
});
// Draw spin wheel if on spin tab
if(G.tab==="spin"){
  requestAnimationFrame(function(){
    var canvas=document.getElementById("spinCanvas");
    if(canvas)drawWheel(canvas,spinAngle);
  });
}
</script>
<canvas id="lvlup-canvas"></canvas>
<div id="lvlup-overlay">
  <div id="lvlup-box">
    <div class="lvlup-title">Level Up!</div>
    <div class="lvlup-level" id="lvlup-num">1</div>
    <div class="lvlup-skill" id="lvlup-skill">Strength</div>
    <div class="lvlup-sub" id="lvlup-sub">Keep forging your legend.</div>
    <button class="lvlup-close" onclick="closeLvlUp()">Continue ⚔</button>
  </div>
</div>
</body>
</html>
