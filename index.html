function getSpinCountdown(){
  var now=new Date();
  var next=new Date();
  if(now.getHours()<4){
    next.setHours(4,0,0,0);
  } else {
    next.setDate(next.getDate()+1);
    next.setHours(4,0,0,0);
  }
  var diff=Math.max(0,Math.floor((next-now)/1000));
  var h=Math.floor(diff/3600);
  var m=Math.floor((diff%3600)/60);
  var s=diff%60;
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

// Canvas wheel drawing
function drawWheel(canvas, angle){
  var ctx=canvas.getContext("2d");
  var W=canvas.width, H=canvas.height;
  var cx=W/2, cy=H/2, r=cx-8;
  var n=SPIN_REWARDS.length;
  var arc=2*Math.PI/n;
  ctx.clearRect(0,0,W,H);

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx,cy,r+6,0,2*Math.PI);
  ctx.strokeStyle="#2a3a55";
  ctx.lineWidth=4;
  ctx.stroke();

  for(var i=0;i<n;i++){
    var startA=angle+i*arc;
    var endA=startA+arc;
    var reward=SPIN_REWARDS[i];

    // Slice fill
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,startA,endA);
    ctx.closePath();
    var isEven=i%2===0;
    ctx.fillStyle=isEven?"#0f1a2a":"#0a1220";
    ctx.fill();
    ctx.strokeStyle=reward.color+"44";
    ctx.lineWidth=1.5;
    ctx.stroke();

    // Colored arc edge
    ctx.beginPath();
    ctx.arc(cx,cy,r,startA,endA);
    ctx.strokeStyle=reward.color;
    ctx.lineWidth=3;
    ctx.stroke();

    // Icon text
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(startA+arc/2);
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.font="18px serif";
    ctx.fillText(reward.icon,r*0.62,0);

    // Label
    ctx.font="bold 9px 'Cinzel', serif";
    ctx.fillStyle=reward.color;
    ctx.fillText(reward.label.length>12?reward.label.slice(0,12)+"..":reward.label, r*0.34, 0);
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx,cy,28,0,2*Math.PI);
  ctx.fillStyle="#0d1220";
  ctx.fill();
  ctx.strokeStyle="#f4c842";
  ctx.lineWidth=2;
  ctx.stroke();

  // Center icon
  ctx.font="18px serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("⚔️",cx,cy);
}

window.doSpin=function(){
  if(!canSpinToday())return;
  var canvas=document.getElementById("spinCanvas");
  if(!canvas)return;

  // Pick result
  spinTargetIdx=spinWeightedPick();
  var n=SPIN_REWARDS.length;
  var arc=2*Math.PI/n;

  // Calculate target angle: spin multiple full rotations + land on target
  // Pointer is at top (angle offset = -PI/2)
  // Target slice center should end up at top
  var targetAngle=-(spinTargetIdx*arc+arc/2)-(Math.PI/2);
  var extraSpins=(5+Math.floor(Math.random()*4))*2*Math.PI;
  var finalAngle=targetAngle+extraSpins;

  var startAngle=spinAngle;
  var totalRotation=finalAngle-startAngle;
  // Normalize so we always spin forward
  while(totalRotation<4*Math.PI)totalRotation+=2*Math.PI;

  var duration=4000+Math.random()*1000; // 4-5 seconds
  var startTime=null;
  var btn=document.getElementById("spinBtn");
  if(btn)btn.disabled=true;

  function easeOut(t){return 1-Math.pow(1-t,4);}

  function animate(ts){
    if(!startTime)startTime=ts;
    var elapsed=ts-startTime;
    var progress=Math.min(1,elapsed/duration);
    var eased=easeOut(progress);
    spinAngle=startAngle+totalRotation*eased;
    drawWheel(canvas,spinAngle);

    if(progress<1){
      spinAnimFrame=requestAnimationFrame(animate);
    } else {
      // Done
      spinAngle=targetAngle%(2*Math.PI);
      drawWheel(canvas,spinAngle);
      var reward=SPIN_REWARDS[spinTargetIdx];
      reward.apply();
      G.lastSpinDate=getDayKey();
      G.spinResult=reward;
      G.spinHistory.unshift({icon:reward.icon,label:reward.label,date:new Date().toLocaleDateString(),color:reward.color});
      savePersist();
      // Show level up effect if jackpot
      if(reward.id==="jackpot")showToast("JACKPOT! 777 Gold!");
      else showToast("You won: "+reward.label+"!");
      render();
    }
  }
  spinAnimFrame=requestAnimationFrame(animate);
};

window.exportSave = function(){
  try {
    var saveData = localStorage.getItem(STORAGE_KEY);
    if(!saveData){ showToast("Nothing to export yet!"); return; }
    var blob = new Blob([saveData], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "liferp-save-" + new Date().toISOString().slice(0,10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Save exported! Keep that file safe.");
  } catch(e) {
    showToast("Export failed: " + e.message);
  }
};

window.importSave = function(){
  var input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = function(e){
    var file = e.target.files[0];
    if(!file){ return; }
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var parsed = JSON.parse(ev.target.result);
        if(!parsed || typeof parsed !== "object"){
          showToast("Invalid save file.");
          return;
        }
        // Validate it looks like a Life RPG save
        if(!parsed.skills && !parsed.gold && !parsed.log){
          showToast("This doesn't look like a Life RPG save file.");
          return;
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
        showToast("Save imported! Reloading...");
        setTimeout(function(){ location.reload(); }, 1200);
      } catch(err){
        showToast("Failed to read save file.");
      }
    };
    reader.readAsText(file);
  };
  input.click();
};

function getQuestDeadline(q){
  var now=new Date();
  var deadline=null;

  if(q.rtype==="daily"){
    // Resets at next 4AM
    var next=new Date();
    if(now.getHours()<4){next.setHours(4,0,0,0);}
    else{next.setDate(next.getDate()+1);next.setHours(4,0,0,0);}
    deadline=next;
  } else if(q.rtype==="weekly"){
    // Resets next Monday at 4AM
    var day=now.getDay(); // 0=Sun,1=Mon...
    var daysToMon=day===0?1:8-day;
    var next=new Date();
    next.setDate(now.getDate()+daysToMon);
    next.setHours(4,0,0,0);
    deadline=next;
  } else if(q.rtype==="weekend"){
    // Resets Monday 4AM
    var day=now.getDay();
    var daysToMon=day===0?1:8-day;
    var next=new Date();
    next.setDate(now.getDate()+daysToMon);
    next.setHours(4,0,0,0);
    deadline=next;
  }

  if(!deadline)return null;
  var diff=Math.max(0,Math.floor((deadline-now)/1000));
  var d=Math.floor(diff/86400);
  var h=Math.floor((diff%86400)/3600);
  var m=Math.floor((diff%3600)/60);
  var s=diff%60;

  var label="";
  if(d>0)label=d+"d "+h+"h left";
  else if(h>0)label=h+"h "+m+"m left";
  else if(m>0)label=m+"m "+s+"s left";
  else label=s+"s left";

  // Urgency color
  var color="var(--text3)";
  if(diff<3600)color="var(--danger)";       // under 1 hour — red
  else if(diff<86400)color="var(--gold)";   // under 24 hours — gold

  return{label:label,color:color,urgent:diff<3600};
}

function getWeekKey(){
  var n=new Date(),day=n.getDay();
  var mon=new Date(n);mon.setDate(n.getDate()-(day===0?6:day-1));
  return mon.toISOString().slice(0,10);
}
function getWeekendKey(){
  // Weekend starts Friday 4AM
  var n=new Date();
  var day=n.getDay(); // 0=Sun,5=Fri,6=Sat
  var fri=new Date(n);
  if(day===0)fri.setDate(n.getDate()-2);
  else if(day===6)fri.setDate(n.getDate()-1);
  else if(day===5&&n.getHours()<4)fri.setDate(n.getDate()-7);
  else{var diff=day>=5?day-5:day+2;fri.setDate(n.getDate()-diff);}
  return fri.toISOString().slice(0,10);
}
function isWeekend(){
  var day=new Date().getDay(),hour=new Date().getHours();
  return(day===5&&hour>=4)||day===6||day===0;
}

function refreshRotatingQuests(){
  var dk=getDayKey(),wk=getWeekKey(),wek=getWeekendKey();
  var rq=G.rotatingQuests||[];
  var changed=false;

  // Daily
  var daily=rq.filter(function(q){return q.rtype==="daily";});
  if(daily.length===0||daily[0].dayKey!==dk){
    rq=rq.filter(function(q){return q.rtype!=="daily";});
    var pick=DAILY_QUESTS[Math.floor(Math.random()*DAILY_QUESTS.length)];
    var nq=JSON.parse(JSON.stringify(pick));
    nq.id="daily_"+dk;nq.rtype="daily";nq.dayKey=dk;nq.done=false;nq.progress=0;
    rq.push(nq);changed=true;
  }

  // Weekly
  var weekly=rq.filter(function(q){return q.rtype==="weekly";});
  if(weekly.length===0||weekly[0].weekKey!==wk){
    rq=rq.filter(function(q){return q.rtype!=="weekly";});
    var pickW=WEEKLY_QUESTS[Math.floor(Math.random()*WEEKLY_QUESTS.length)];
    var nqW=JSON.parse(JSON.stringify(pickW));
    nqW.id="weekly_"+wk;nqW.rtype="weekly";nqW.weekKey=wk;nqW.done=false;nqW.progress=0;
    rq.push(nqW);changed=true;
  }

  // Weekend
  if(isWeekend()){
    var weekend=rq.filter(function(q){return q.rtype==="weekend";});
    if(weekend.length===0||weekend[0].weekendKey!==wek){
      rq=rq.filter(function(q){return q.rtype!=="weekend";});
      var pickWE=WEEKEND_QUESTS[Math.floor(Math.random()*WEEKEND_QUESTS.length)];
      var nqWE=JSON.parse(JSON.stringify(pickWE));
      nqWE.id="weekend_"+wek;nqWE.rtype="weekend";nqWE.weekendKey=wek;nqWE.done=false;nqWE.progress=0;
      rq.push(nqWE);changed=true;
    }
  }

  G.rotatingQuests=rq;
  if(changed)savePersist();
}

// ── Quest progress tracking ──────────────────────
function checkQuestProgress(actionId, domain){
  var allQuests=(G.quests||[]).concat(G.rotatingQuests||[]).concat(G.customQuests||[]);
  var completed=[];

  allQuests.forEach(function(q){
    if(q.done)return;
    if(!q.type||q.type==="manual")return;

    var matched=false;

    if(q.type==="count"||q.type==="streak"){
      if(q.actions&&q.actions.length>0){
        matched=q.actions.indexOf(actionId)!==-1;
      }
    } else if(q.type==="domain"){
      matched=(domain===q.domain);
    } else if(q.type==="multi"){
      // Any of the listed actions count
      if(q.actions&&q.actions.indexOf(actionId)!==-1)matched=true;
    } else if(q.type==="any"){
      matched=true;
    }

    if(matched){
      q.progress=(q.progress||0)+1;
      if(q.progress>=q.target){
        q.done=true;
        completed.push(q);
      }
    }
  });

  if(completed.length>0){
    savePersist();
    // Suppress level up popups while quest popup is showing
    // They'll fire after user clicks Claim
    G._suppressLvlUp=true;
    completed.forEach(function(q){
      setTimeout(function(){showQuestCompletePopup(q);},300);
    });
  } else if(allQuests.some(function(q){return!q.done&&q.type&&q.type!=="manual";})){
    savePersist();
  }
}

function showQuestCompletePopup(q){
  var sk=skById(q.skill);
  var color=sk?sk.color:"#f4c842";
  var chestLine=q.chest?'<div style="font-size:13px;color:var(--text2);margin-bottom:12px;">+1 '+q.chest+' chest added to Inventory</div>':"";

  // Award gold + XP directly WITHOUT triggering level up popup yet
  // Level up popups will fire after user clicks Claim
  G.gold+=(q.gold||0);
  G.totalXP=(G.totalXP||0)+q.xp;
  G.log.unshift({label:"Quest: "+q.title,xp:q.xp,gold:q.gold||0,time:new Date().toLocaleTimeString(),date:new Date().toLocaleDateString(),skillId:q.skill||"discipline"});
  // Apply XP to skill silently, collect any level ups
  var skillId=q.skill||"discipline";
  var sk2=G.skills[skillId];
  var nx=sk2.xp+q.xp,nl=sk2.level,lvUps=[];
  while(nx>=xpForSkillLv(nl)){nx-=xpForSkillLv(nl);nl++;lvUps.push({skill:skById(skillId),level:nl});}
  G.skills[skillId]={xp:nx,level:nl};
  if(q.chest){
    var ck=q.chest==="legendary"?"legendaryChests":q.chest==="rare"?"rareChests":"chests";
    G[ck]=(G[ck]||0)+1;
  }
  // Award gems based on quest type
  var gemsToAward=0;
  if(q.gemReward){gemsToAward=q.gemReward;}
  else if(q.rtype==="weekly"||q.rtype==="weekend"){gemsToAward=1;}
  else if(!q.rtype&&!q.isCustom){gemsToAward=2;}
  if(gemsToAward>0){G.gems=(G.gems||0)+gemsToAward;showToast("+"+gemsToAward+" 💎 earned!");}
  savePersist();
  render();
  // Store pending level ups to show AFTER quest popup is claimed
  G._pendingLvUps=(G._pendingLvUps||[]).concat(lvUps);

  var container=document.createElement("div");
  container.className="qc-popup-bg";
  container.id="qcPopup";
  container.innerHTML=
    '<div class="qc-popup" style="border:1px solid '+color+'44;">'+
      '<div class="qc-icon">🏆</div>'+
      '<div class="qc-title">Quest Complete!</div>'+
      '<div class="qc-name">'+q.title+'</div>'+
      '<div class="qc-rewards">'+
        '<div class="qc-reward"><div class="qc-reward-val" style="color:'+color+';">+'+q.xp+'</div><div class="qc-reward-lbl">XP</div></div>'+
        '<div class="qc-reward"><div class="qc-reward-val" style="color:var(--gold);">+'+(q.gold||0)+'</div><div class="qc-reward-lbl">Gold</div></div>'+
      '</div>'+
      chestLine+
      '<button class="qc-close" onclick="closeQCPopup()">Claim ✓</button>'+
    '</div>';
  document.body.appendChild(container);
  stopFireworksForce();
  startFireworks(color);
  // Stops when user clicks Claim
}

window.closeQCPopup=function(){
  var el=document.getElementById("qcPopup");
  if(el)el.remove();
  stopFireworksForce();
  G._suppressLvlUp=false;
  // Now show any level ups queued during this quest
  var pending=G._pendingLvUps||[];
  G._pendingLvUps=[];
  pending.forEach(function(item){
    showLvlUp(item.skill,item.level);
  });
  var newTL=totalLv();
  if(newTL>G._lastTotalLv){
    G._lastTotalLv=newTL;

  }
};

function rotPoolById(id){return ROT_POOL.filter(function(r){return r.id===id;})[0];}

function initRotatingSlots(){
  var slots=G.rotatingSlots||[];
  var now=Date.now();
  // Refresh expired slots
  while(slots.length<2){slots.push(newRotSlot(slots));}
  slots=slots.map(function(s){
    if(now>=s.expiresAt){return newRotSlot(slots);}
    return s;
  });
  // Make sure slots have different items
  if(slots.length>=2&&slots[0].itemId===slots[1].itemId){
    slots[1]=newRotSlot([slots[0]]);
  }
  G.rotatingSlots=slots;
  savePersist();
}

function newRotSlot(existing){
  var usedIds=(existing||[]).map(function(s){return s.itemId;});
  var available=ROT_POOL.filter(function(r){return usedIds.indexOf(r.id)===-1;});
  var item=available[Math.floor(Math.random()*available.length)];
  var duration=item.dur();
  // Cap at 3 days
  duration=Math.min(duration,3*24*3600000);
  return{itemId:item.id,expiresAt:Date.now()+duration,purchased:false};
}

function getRotTimeLeft(slot){
  var diff=Math.max(0,slot.expiresAt-Date.now());
  var h=Math.floor(diff/3600000);
  var m=Math.floor((diff%3600000)/60000);
  var urgent=diff<3600000;
  var label=h>0?h+"h "+m+"m left":m+"m left";
  return{label:label,urgent:urgent};
}

function rRotShop(){
  initRotatingSlots();
  var slotsHTML=G.rotatingSlots.map(function(slot,idx){
    var item=rotPoolById(slot.itemId);
    if(!item)return"";
    var tl=getRotTimeLeft(slot);
    var tierLabel=item.tier===1?"Gold":item.tier===2?"Gold + Gems":"Gems Only";
    var canAfford=(G.gold>=item.gold)&&(G.gems>=item.gems);
    var costHTML="";
    if(item.gold>0)costHTML+='<span class="rot-cost-gold">'+item.gold+'g</span>';
    if(item.gems>0)costHTML+='<span class="rot-cost-gems">'+item.gems+'💎</span>';
    return'<div class="rot-slot tier'+item.tier+'">'+
      '<div class="rot-slot-badge">'+tierLabel+'</div>'+
      '<div class="rot-icon">'+item.icon+'</div>'+
      '<div class="rot-name">'+item.name+'</div>'+
      '<div class="rot-desc">'+item.desc+'</div>'+
      '<div class="rot-cost">'+costHTML+'</div>'+
      (slot.purchased
        ?'<div style="font-size:11px;color:var(--success);font-family:"Cinzel",serif;">✓ Purchased</div>'
        :'<button class="rot-buy-btn tier'+item.tier+'" onclick="buyRotItem('+idx+')" '+(canAfford?"":"disabled")+'>'+
          (canAfford?"Buy Now":"Not enough "+(G.gold<item.gold?"Gold":"Gems"))+
        '</button>')+
      '<div class="rot-timer'+(tl.urgent?" urgent":"")+'">⏰ '+tl.label+'</div>'+
    '</div>';
  }).join("");

  return slotsHTML;
}

window.buyRotItem=function(slotIdx){
  initRotatingSlots();
  var slot=G.rotatingSlots[slotIdx];
  if(!slot||slot.purchased)return;
  var item=rotPoolById(slot.itemId);
  if(!item)return;
  if(G.gold<item.gold||G.gems<item.gems){
    showToast("Not enough "+(G.gold<item.gold?"Gold":"Gems")+"!");return;
  }
  G.gold-=item.gold;
  G.gems-=item.gems;
  slot.purchased=true;
  item.apply();
  savePersist();render();
};

var rotTicker=null;
function startRotTicker(){
  if(rotTicker)clearInterval(rotTicker);
  rotTicker=setInterval(function(){
    if(G.tab!=="shop"){clearInterval(rotTicker);rotTicker=null;return;}
    // Check if any slot expired
    var now=Date.now();
    var changed=false;
    (G.rotatingSlots||[]).forEach(function(s){if(now>=s.expiresAt){changed=true;}});
    if(changed){initRotatingSlots();}
    render();
  },30000); // check every 30s
}

function getActivePetData(slotIdx){
  var petUid=G.activePets[slotIdx];
  if(!petUid)return null;
  var pet=(G.ownedPets||[]).filter(function(p){return p.id===petUid;})[0];
  if(!pet)return null;
  return PET_DATA[pet.petId]?Object.assign({},PET_DATA[pet.petId],{uid:pet.id,petId:pet.petId}):null;
}

function isPetActive(uid){
  return(G.activePets||[]).indexOf(uid)!==-1;
}

function isSlotLocked(slotIdx){
  var cd=(G.slotCooldowns||[])[slotIdx];
  return cd&&Date.now()<cd;
}

function getSlotCooldownLabel(slotIdx){
  var cd=(G.slotCooldowns||[])[slotIdx];
  if(!cd||Date.now()>=cd)return null;
  var diff=cd-Date.now();
  var h=Math.floor(diff/3600000);
  var m=Math.floor((diff%3600000)/60000);
  return h>0?h+"h "+m+"m":m+"m left";
}

function canEvolve(){
  var owned=G.ownedPets||[];
  var counts={};
  owned.forEach(function(p){if(!p.evolved){counts[p.petId]=(counts[p.petId]||0)+1;}});
  return Object.keys(counts).filter(function(k){return counts[k]>=2;});
}

function applyPetBonus(baseXP, baseGold, domain){
  var xp=baseXP, gold=baseGold;
  for(var i=0;i<2;i++){
    var pet=getActivePetData(i);
    if(!pet)continue;
    if(pet.petId==="dog"||pet.petId==="guardian_dog"){
      gold+=pet.petId==="guardian_dog"?6:3;
    }
    if(pet.petId==="wolf"&&domain==="Health")xp=Math.round(xp*1.08);
    if(pet.petId==="shadow_wolf"&&domain==="Health")xp=Math.round(xp*1.18);
    if(pet.petId==="owl"&&domain==="Learning")xp=Math.round(xp*1.08);
    if(pet.petId==="star_owl"&&domain==="Learning")xp=Math.round(xp*1.18);
    if(pet.petId==="dragon"&&domain==="Productivity")xp=Math.round(xp*1.08);
    if(pet.petId==="inferno_dragon"&&domain==="Productivity")xp=Math.round(xp*1.18);
    if(pet.petId==="butterfly"&&domain==="Spiritual")xp=Math.round(xp*1.08);
    if(pet.petId==="soul_butterfly"&&domain==="Spiritual")xp=Math.round(xp*1.18);
  }
  return{xp:xp,gold:gold};
}

function checkOrbBonus(){
  // Spirit Orb: every 5th action gives free chest
  for(var i=0;i<2;i++){
    var pet=getActivePetData(i);
    if(!pet)continue;
    if(pet.petId==="orb"||pet.petId==="void_orb"){
      G.actionCount=(G.actionCount||0)+1;
      if(G.actionCount%5===0){
        if(pet.petId==="void_orb"){G.rareChests=(G.rareChests||0)+1;G.totalChestsEarned=(G.totalChestsEarned||0)+1;showToast("💫 Void Orb: free Rare Chest!");}
        else{G.chests=(G.chests||0)+1;showToast("🔮 Spirit Orb: free Common Chest!");}
      }
      break;
    }
  }
}

function checkInfernoDragonGem(actionId){
  if(actionId!=="deep_work")return;
  for(var i=0;i<2;i++){
    var pet=getActivePetData(i);
    if(pet&&pet.petId==="inferno_dragon"){G.gems=(G.gems||0)+1;showToast("🔥 Inferno Dragon: +1💎!");}
  }
}

function checkWeeklyPetKey(){
  // Guardian Dog: free key once per week
  var wk=getWeekKey();
  if(G._lastPetKeyWeek===wk)return;
  for(var i=0;i<2;i++){
    var pet=getActivePetData(i);
    if(pet&&pet.petId==="guardian_dog"){
      G.keys=(G.keys||0)+1;
      G._lastPetKeyWeek=wk;
      showToast("🐕‍🦺 Guardian Dog: free key this week!");

window.openPetPicker=function(slotIdx){
  if(isSlotLocked(slotIdx)){showToast("Slot locked for "+getSlotCooldownLabel(slotIdx)+"!");return;}
  G._pickingSlot=slotIdx;
  render();
};

window.closePetPicker=function(){
  G._pickingSlot=null;
  render();
};

window.assignPet=function(uid){
  var slotIdx=G._pickingSlot;
  if(slotIdx===null||slotIdx===undefined)return;
  if(isSlotLocked(slotIdx)){showToast("Slot is locked!");return;}
  // Unassign from other slot if already active
  var other=G.activePets[slotIdx===0?1:0];
  if(uid===other){showToast("Pet already in other slot!");return;}
  // Apply cooldown to this slot
  if(!G.slotCooldowns)G.slotCooldowns=[null,null];
  if(G.activePets[slotIdx]!==null){
    G.slotCooldowns[slotIdx]=Date.now()+(24*3600000);
  }
  G.activePets[slotIdx]=uid;
  G._pickingSlot=null;
  var pet=(G.ownedPets||[]).filter(function(p){return p.id===uid;})[0];
  var pd=pet?PET_DATA[pet.petId]:null;
  showToast((pd?pd.icon:"🐾")+" "+(pd?pd.name:"Pet")+" activated in slot "+(slotIdx+1)+"!");
  savePersist();render();
};

window.removePet=function(slotIdx){
  if(isSlotLocked(slotIdx)){showToast("Slot locked for "+getSlotCooldownLabel(slotIdx)+"!");return;}
  if(!G.slotCooldowns)G.slotCooldowns=[null,null];
  if(G.activePets[slotIdx]!==null){
    G.slotCooldowns[slotIdx]=Date.now()+(24*3600000);
  }
  G.activePets[slotIdx]=null;
  savePersist();render();
};

window.evolvePets=function(petId){
  var owned=G.ownedPets||[];
  var pair=owned.filter(function(p){return p.petId===petId&&!p.evolved;}).slice(0,2);
  if(pair.length<2){showToast("Need 2 of the same pet to evolve!");return;}
  var evolvedId=EVOLVE_MAP[petId];
  if(!evolvedId){showToast("No evolution found!");return;}
  var ePet=PET_DATA[evolvedId];
  // Remove both base pets
  var removed=0;
  G.ownedPets=owned.filter(function(p){
    if(p.petId===petId&&!p.evolved&&removed<2){removed++;return false;}
    return true;
  });
  // Remove from active slots if either was active
  for(var i=0;i<2;i++){
    if(pair.some(function(p){return p.id===G.activePets[i];})){
      G.activePets[i]=null;
      G.slotCooldowns[i]=null;
    }
  }
  // Add evolved pet
  var newPet={id:Date.now(),petId:evolvedId,name:ePet.name,icon:ePet.icon,evolved:true};
  G.ownedPets.push(newPet);
  savePersist();
  showToast(ePet.icon+" Evolution! "+ePet.name+" has awakened!");
  render();
};

  var cls=G.avatarClass||0;

  if(cls===0&&domain==="Health")   xp=Math.round(xp*1.10);
  if(cls===1&&domain==="Learning") xp=Math.round(xp*1.10);
  if(cls===2&&domain==="Productivity") xp=Math.round(xp*1.10);
  if(cls===3) gold=Math.round(gold*1.10);
  if(cls===4&&streak>0) xp=Math.round(xp*1.10);
  if(cls===5&&domain==="Spiritual") xp=Math.round(xp*1.10);
  if(cls===7&&streak>=7) xp=Math.round(xp*1.15);
  if(cls===8&&(domain==="Spiritual"||domain==="Learning")) xp=Math.round(xp*1.10);
  return{xp:xp,gold:gold};
}

window.checkPassStrength=function(){
  var pass=document.getElementById("obSyncPass");
  if(!pass)return;
  var v=pass.value;
  function set(id,ok,text){
    var el=document.getElementById(id);
    if(!el)return;
    el.style.color=ok?"#2ab88a":"var(--text3)";
    el.textContent=(ok?"✓ ":"✗ ")+text;
  }
  set("pc1",v.length>=8,"At least 8 characters");
  set("pc2",/[A-Z]/.test(v),"One uppercase letter (A-Z)");
  set("pc3",/[a-z]/.test(v),"One lowercase letter (a-z)");
  set("pc4",/[0-9]/.test(v),"One number (0-9)");
  set("pc5",/[^A-Za-z0-9]/.test(v),"One special character (!@#$%)");
};

function validatePassword(pass){
  if(pass.length<8)return"Password must be at least 8 characters.";
  if(!/[A-Z]/.test(pass))return"Add an uppercase letter (A-Z).";
  if(!/[a-z]/.test(pass))return"Add a lowercase letter (a-z).";
  if(!/[0-9]/.test(pass))return"Add a number (0-9).";
  if(!/[^A-Za-z0-9]/.test(pass))return"Add a special character (!@#$%).";
  return null;
}

window.obCreateAccount=async function(){
  var email=document.getElementById("obEmail").value.trim().toLowerCase();
  var pass=document.getElementById("obSyncPass").value;
  if(!email||!email.includes("@")){showToast("Enter a valid email address.");return;}
  var passErr=validatePassword(pass);
  if(passErr){showToast(passErr);return;}
  var msg=document.getElementById("obAccountMsg");
  if(msg)msg.textContent="Creating account..."; if(msg)msg.className="sync-status";
  var result=await sbSignUp(email,pass);
  console.log("Signup result:", JSON.stringify(result));
  if(result.error||result.code){
    var errMsg=result.error&&result.error.message||result.msg||result.message||"Error creating account.";
    if(msg){msg.textContent=errMsg;msg.className="sync-status err";} return;

  }
};

function getTimePlayed(){
  // Estimate from first log entry date or creation date
  var log=G.log||[];
  if(log.length===0)return"Just started";
  // Count unique day keys from log
  var days=new Set();
  log.forEach(function(e){if(e.date)days.add(e.date);});
  var d=days.size;
  if(d===0)return"Day 1";
  if(d===1)return"1 day";
  return d+" days";
}

function getTotalActionsLogged(){
  return(G.log||[]).filter(function(e){return!e.label||!e.label.startsWith("Quest:");}).length;
}

function getTotalQuestsCompleted(){
  var main=(G.quests||[]).filter(function(q){return q.done;}).length;
  var custom=(G.customQuests||[]).filter(function(q){return q.done;}).length;
  return Math.max(main+custom, G.totalQuestsDone||0);
}

function getTotalGoldEarned(){
  return(G.log||[]).reduce(function(sum,e){return sum+(e.gold||0);},0);
}

function getTopSkill(){
  var top=null,topLv=0;
  SKILLS.forEach(function(sk){
    var s=G.skills[sk.id]||(G.skills[sk.id]={xp:0,level:1});
    if(s.level>topLv){topLv=s.level;top=sk;}
  });
  return top;
}

function getEarnedTitles(){
  var titles=[];
  // From inventory
  (G.inventory||[]).forEach(function(t){
    if(typeof t==="string"&&["The Relentless","Seeker of Truth","Awakened"].includes(t)){
      titles.push(t);
    }
  });
  // From quests
  (G.quests||[]).forEach(function(q){
    if(q.done&&q.title)titles.push(q.title);
  });
  return titles.slice(0,6);
}

function updateDCProgress(actionId, domain){
  var dc=G.dailyChallenge;
  if(!dc||G.dcClaimed)return;
  var dk=getDCKey();
  if(G.lastDCKey!==dk)return;
  var hit=false;
  if(dc.type==="domain"&&domain===dc.domain)hit=true;
  if(dc.type==="count")hit=true;
  if(dc.type==="action"&&actionId===dc.action)hit=true;
  if(hit){
    G.dcProgress=Math.min((G.dcProgress||0)+1,dc.target);
    if(G.dcProgress>=dc.target&&!G.dcClaimed){
      G.dcClaimed=true;
      claimDC(dc);
    }
    savePersist();
  }
}

function claimDC(dc){
  G.gold+=(dc.gold||0);
  G.totalXP=(G.totalXP||0)+(dc.xp||0);
  if(dc.gems)G.gems=(G.gems||0)+dc.gems;
  if(dc.chest==="rare")G.rareChests=(G.rareChests||0)+1;G.totalChestsEarned=(G.totalChestsEarned||0)+1;
  if(dc.chest==="legendary")G.legendaryChests=(G.legendaryChests||0)+1;G.totalChestsEarned=(G.totalChestsEarned||0)+1;
  if(dc.shield)G.streakShield=(G.streakShield||0)+1;

var seTimer=null;
function startSuddenEventTimer(){
  if(seTimer)clearTimeout(seTimer);
  // Random event every 20-45 minutes of active play
  var delay=(20+Math.floor(Math.random()*25))*60000;
  seTimer=setTimeout(function(){
    triggerSuddenEvent();
  },delay);
}

function triggerSuddenEvent(){
  var ev=SE_POOL[Math.floor(Math.random()*SE_POOL.length)];
  showSuddenEvent(ev);
  startSuddenEventTimer(); // queue next one
}

function showSuddenEvent(ev){
  var existing=document.getElementById("sePopup");
  if(existing)existing.remove();
  var div=document.createElement("div");
  div.id="sePopup";
  div.className="event-popup";
  div.style.borderColor="#2ab88a55";
  var endTime=ev.duration?Date.now()+ev.duration:null;
  div.innerHTML=
    '<button class="event-popup-close" onclick="dismissSuddenEvent()">✕</button>'+
    '<div class="event-popup-top">'+
      '<div class="event-popup-icon">'+ev.icon+'</div>'+
      '<div class="event-popup-title">'+ev.title+'</div>'+
    '</div>'+

window.claimSuddenEvent=function(id){
  var ev=SE_POOL.filter(function(e){return e.id===id;})[0];

window.dismissSuddenEvent=function(){

};

  for(var i=0;i<2;i++){
    var idx=Math.floor(Math.random()*pool.length);
    items.push(pool.splice(idx,1)[0]);

  if(existing)existing.remove();
  var timeLeft=Math.max(0,Math.round((m.expiresAt-Date.now())/60000));
  var itemsHTML=m.items.map(function(item,idx){
    return'<div class="merchant-item">'+
      '<div class="merchant-item-icon">'+item.icon+'</div>'+
      '<div style="flex:1;">'+

    '<div class="merchant-icon">🧙</div>'+
    '<div class="merchant-title">Mysterious Merchant</div>'+
    '<div class="merchant-sub">A rare visitor with exclusive wares</div>'+

    itemsHTML+
    '<button class="merchant-close-btn" onclick="closeMerchant()">Send them away</button>'+
  '</div>';
  document.body.appendChild(div);
  // Start countdown
  var mInterval=setInterval(function(){
    var tl=Math.max(0,Math.round((G.merchantActive.expiresAt-Date.now())/60000));
    var timerEl=document.getElementById("merchantTimer");
    if(timerEl)timerEl.textContent="⏰ Leaves in "+tl+" minutes";
    if(Date.now()>=G.merchantActive.expiresAt){
      clearInterval(mInterval);
      closeMerchant();
      showToast("🧙 The merchant has disappeared...");
    }
  },30000);
}

window.buyMerchantItem=function(idx){
  var m=G.merchantActive;
  if(!m||!m.items[idx])return;
  var item=m.items[idx];
  if(G.gold<item.gold){showToast("Not enough Gold!");return;}
  if(item.gems&&G.gems<item.gems){showToast("Not enough Gems!");return;}
  G.gold-=item.gold;
  if(item.gems)G.gems-=item.gems;
  // Apply item
  if(item.name==="Legendary Chest"){G.legendaryChests=(G.legendaryChests||0)+1;G.totalChestsEarned=(G.totalChestsEarned||0)+1;}
  else if(item.name==="Mega Boost 24h")G.boostHourExpiry=Date.now()+24*3600000;
  else if(item.giveGems)G.gems=(G.gems||0)+item.giveGems;
  else if(item.name==="Key Bundle x4")G.keys=(G.keys||0)+4;
  else if(item.name==="Shield Pack x2")G.streakShield=(G.streakShield||0)+2;
  else if(item.name==="Mystery Bundle"){G.chests=(G.chests||0)+1;G.keys=(G.keys||0)+1;G.boostActionsLeft=(G.boostActionsLeft||0)+3;}
  m.items.splice(idx,1);
  savePersist();
  showToast("✓ "+item.name+" purchased!");
  if(m.items.length===0){closeMerchant();return;}
  showMerchantPopup(); // refresh
};

window.closeMerchant=function(){
  var el=document.getElementById("merchantPopup");
  if(el)el.remove();
  G.merchantActive=null;
  G._showMerchant=false;
  savePersist();
};

async function tryRestoreSession(){
  var stored=localStorage.getItem("sb_session");
  if(!stored)return false;
  try{
    var sess=JSON.parse(stored);
    // Check if token is still valid by refreshing
    var resp=await fetch(SB_URL+"/auth/v1/token?grant_type=refresh_token",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY},
      body:JSON.stringify({refresh_token:sess.refresh_token})
    });
    if(!resp.ok){localStorage.removeItem("sb_session");return false;}
    var data=await resp.json();
    if(data.access_token){
      _sbSession=data;
      localStorage.setItem("sb_session",JSON.stringify(data));
      return true;
    }
  }catch(e){}
  return false;
}

// ════════════════════════════════════════════════
// HANDLE AUTH REDIRECT (email confirm + password reset)
// ════════════════════════════════════════════════
async function handleAuthRedirect(){
  // Check both hash (#) and query string (?) for tokens
  var hash=window.location.hash;
  var search=window.location.search;
  var raw=(hash||"").replace(/^#/,"")+"&"+(search||"").replace(/^\?/,"");
  if(raw.indexOf("access_token")===-1&&raw.indexOf("token_hash")===-1&&raw.indexOf("type")===-1)return false;
  // Parse all params
  var params={};
  raw.split("&").forEach(function(p){
    var kv=p.split("=");if(kv[0])params[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||"");
  });
  var type=params["type"];
  var accessToken=params["access_token"];
  var refreshToken=params["refresh_token"];
  var tokenHash=params["token_hash"];
  // Clear URL without triggering reload
  history.replaceState(null,"",window.location.pathname);

  if(type==="recovery"){
    // Use access_token if present, otherwise use token_hash to get a session
    if(!accessToken&&tokenHash){
      try{
        var vresp=await fetch(SB_URL+"/auth/v1/verify",{
          method:"POST",
          headers:{"Content-Type":"application/json","apikey":SB_KEY},
          body:JSON.stringify({token_hash:tokenHash,type:"recovery"})
        });
        if(vresp.ok){var vdata=await vresp.json();accessToken=vdata.access_token;}
      }catch(e){}
    }
    if(accessToken){showPasswordRecoveryModal(accessToken);return true;}
    return false;
  }

  if(!accessToken)return false;
  // type === "signup" or "magiclink" — auto login
  try{
    var resp=await fetch(SB_URL+"/auth/v1/token?grant_type=refresh_token",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY},
      body:JSON.stringify({refresh_token:refreshToken})
    });
    if(resp.ok){
      var data=await resp.json();
      if(data.access_token){
        _sbSession=data;
        localStorage.setItem("sb_session",JSON.stringify(data));
        var cloudSave=await loadSaveFromCloud();
        if(cloudSave){Object.keys(cloudSave).forEach(function(k){G[k]=cloudSave[k];});}
        G._syncUser=data.user.id;
        G._syncEmail=data.user.email||"";
        G.onboarded=true;
        savePersist();
        showToast("✓ Email confirmed! You are now logged in.");
        return true;
      }
    }
  }catch(e){}
  return false;
}

function showPasswordRecoveryModal(accessToken){
  var div=document.createElement("div");
  div.id="recoveryModal";
  div.className="recovery-overlay";
  div.innerHTML=
    '<div class="recovery-card">'+
      '<div class="recovery-logo">🔑 NEW PASSWORD</div>'+
      '<div class="recovery-sub">Enter your new password below.</div>'+
      '<input class="recovery-input" id="recPass1" type="password" autocapitalize="none" autocorrect="off" placeholder="New password..." maxlength="50" oninput="recCheckPass()" />'+
      '<input class="recovery-input" id="recPass2" type="password" autocapitalize="none" autocorrect="off" placeholder="Confirm password..." maxlength="50" />'+
      '<div id="recChecklist" style="text-align:left;margin-bottom:16px;padding:10px 14px;background:var(--bg2);border-radius:10px;font-size:12px;line-height:2;">'+
        '<div id="rpc1" style="color:var(--text3);">✗ At least 8 characters</div>'+
        '<div id="rpc2" style="color:var(--text3);">✗ One uppercase letter (A-Z)</div>'+
        '<div id="rpc3" style="color:var(--text3);">✗ One lowercase letter (a-z)</div>'+
        '<div id="rpc4" style="color:var(--text3);">✗ One number (0-9)</div>'+
        '<div id="rpc5" style="color:var(--text3);">✗ One special character (!@#$%)</div>'+
      '</div>'+
      '<button class="recovery-btn" onclick="doPasswordRecovery(\''+accessToken+'\')">Set New Password</button>'+
      '<div id="recMsg" class="recovery-status"></div>'+
    '</div>';
  document.body.appendChild(div);
}

window.recCheckPass=function(){
  var v=document.getElementById("recPass1").value;
  function set(id,ok,text){var el=document.getElementById(id);if(!el)return;el.style.color=ok?"#2ab88a":"var(--text3)";el.textContent=(ok?"✓ ":"✗ ")+text;}
  set("rpc1",v.length>=8,"At least 8 characters");
  set("rpc2",/[A-Z]/.test(v),"One uppercase letter (A-Z)");
  set("rpc3",/[a-z]/.test(v),"One lowercase letter (a-z)");
  set("rpc4",/[0-9]/.test(v),"One number (0-9)");
  set("rpc5",/[^A-Za-z0-9]/.test(v),"One special character (!@#$%)");
};

window.doPasswordRecovery=async function(accessToken){
  var p1=document.getElementById("recPass1").value;
  var p2=document.getElementById("recPass2").value;
  var msg=document.getElementById("recMsg");
  if(!p1||p1!==p2){msg.textContent="Passwords do not match.";msg.className="recovery-status err";return;}
  var err=validatePassword(p1);
  if(err){msg.textContent=err;msg.className="recovery-status err";return;}
  msg.textContent="Updating...";msg.className="recovery-status";
  try{
    // If not a JWT (no dots), it's a token_hash — verify it first to get a real session
    var realToken=accessToken;
    if(accessToken.split(".").length!==3){
      var vresp=await fetch(SB_URL+"/auth/v1/verify",{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SB_KEY},
        body:JSON.stringify({token_hash:accessToken,type:"recovery"})
      });
      var vdata=await vresp.json();
      if(!vresp.ok||!vdata.access_token){
        msg.textContent=vdata.error_description||vdata.msg||"Invalid or expired link. Request a new one.";
        msg.className="recovery-status err";return;
      }
      realToken=vdata.access_token;
    }
    var resp=await fetch(SB_URL+"/auth/v1/user",{
      method:"PUT",
      headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+realToken},
      body:JSON.stringify({password:p1})
    });
    var data=await resp.json();
    if(resp.ok&&data.id){
      msg.textContent="✓ Password updated! You can now log in.";msg.className="recovery-status ok";
      setTimeout(function(){
        var el=document.getElementById("recoveryModal");
        if(el)el.remove();
        if(!G.onboarded){G._obStep=0;renderOnboarding();setTimeout(function(){obRestoreAccount();},100);}
      },2000);
    } else {
      msg.textContent=(data.message||data.msg||"Error updating password. Try again.");
      msg.className="recovery-status err";
    }
  }catch(e){
    msg.textContent="Network error. Please try again.";
    msg.className="recovery-status err";
  }
};

if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(function(){});}
checkStreakShield();

checkWeeklyPetKey();
// Handle email confirmation and password reset links first
handleAuthRedirect().then(function(wasRedirect){
  // Try to restore Supabase session silently
  tryRestoreSession().then(function(restored){
    if(restored&&_sbSession){
      G._syncUser=_sbSession.user.id;
      savePersist();
    }
  });
  initDailyChallenge();
  startSuddenEventTimer();
  // Show onboarding only if not a recovery redirect
  if(!G.onboarded&&!wasRedirect){
    G._obStep=0;
    G._obClass=G.avatarClass||0;
    setTimeout(function(){renderOnboarding();},300);
  }
  G._lastTotalLv=totalLv();
  render();
});

if(G.tab==="spin"){
  requestAnimationFrame(function(){
    var canvas=document.getElementById("spinCanvas");
    if(canvas)drawWheel(canvas,spinAngle);
  });
}
