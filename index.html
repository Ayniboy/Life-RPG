<!DOCTYPE html>
<!-- Life RPG v2.4 - Save Version 23 -->
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life RPG">
<meta name="theme-color" content="#07090f">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="format-detection" content="telephone=no">
<title>Life RPG</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ── Cross-browser compatibility ── */
*{-webkit-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
input,button,textarea,select{-webkit-appearance:none;-moz-appearance:none;appearance:none;font-family:inherit;}
button{touch-action:manipulation;cursor:pointer;border:none;background:none;}
img{-webkit-user-drag:none;user-drag:none;}
/* Prevent iOS text size adjust */
html{-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;text-size-adjust:100%;}
/* Firefox scrollbar */
*{scrollbar-width:thin;scrollbar-color:var(--border2) var(--bg);}
/* Smooth scrolling everywhere */
html{scroll-behavior:smooth;}
/* Fix iOS momentum scrolling */
.content,.drawer,.av-modal{-webkit-overflow-scrolling:touch;}
/* Prevent double-tap zoom on buttons */
button,a{touch-action:manipulation;}
/* Fix Firefox focus outline */
button:focus,input:focus,textarea:focus{outline:none;}
/* Fix iOS input zoom — keep font-size at 16px minimum */
input,textarea,select{font-size:16px;}

:root{--bg:#07090f;--bg2:#0d1220;--bg3:#111827;--border:#1e2a3a;--border2:#2a3a50;--text:#c8d4e8;--text2:#6a8aaa;--text3:#3a5570;--gold:#f4c842;--gold-bg:#1a1608;--gold-border:#3a2e08;--health:#e85d3a;--productivity:#4a8fff;--learning:#2ab88a;--mindset:#c456a0;--strength:#e85d3a;--endurance:#e8923a;--focus:#4a8fff;--discipline:#8b6fe8;--wisdom:#2ab88a;--creativity:#5ab83a;--mindset-sk:#c456a0;--serenity:#7ab4ea;--spiritual:#1a3a5a;--legendary:#f4c842;--uncommon:#4a8fff;--common:#6a8aaa;--success:#2ab88a;--danger:#e85d3a;--journal-g:#f4c842;--journal-i:#c456a0;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:16px;overscroll-behavior:none;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:680px;margin:0 auto;overflow-x:hidden;width:100%;}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,rgba(7,9,15,.98),rgba(7,9,15,.92));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);width:100%;box-sizing:border-box;}
.hdr-row1{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:calc(10px + var(--safe-top)) 14px 10px;}
.hdr-row2{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--border);}
.hdr-left{display:flex;align-items:center;gap:8px;}
.hdr-mid{text-align:center;}
.hdr-right{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.hdr-game-title{font-family:"Cinzel",serif;font-size:22px;font-weight:700;letter-spacing:4px;background:linear-gradient(135deg,#f4c842,#e8923a,#f4c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px rgba(244,200,66,.4));white-space:nowrap;display:flex;align-items:center;gap:8px;justify-content:center;}.hdr-title-icon{font-size:16px;opacity:.7;-webkit-text-fill-color:initial;background:none;}
.hdr-lv-num{font-family:"Cinzel",serif;font-size:13px;font-weight:700;color:#e8d5a0;white-space:nowrap;flex-shrink:0;}
.hdr-lv-title{font-size:10px;color:var(--text2);white-space:nowrap;flex-shrink:0;}
.hdr-xp-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0;}
.hdr-game-sub{display:none;}
.header-title{font-family:"Cinzel",serif;font-size:19px;font-weight:700;color:#e8d5a0;letter-spacing:2px;}
.header-sub{font-size:11px;color:var(--text2);letter-spacing:.5px;margin-top:2px;}
.gold-pill{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:20px;padding:5px 12px;font-family:"Cinzel",serif;font-size:13px;font-weight:600;color:var(--gold);white-space:nowrap;}
.av-wrap{text-align:center;cursor:pointer;flex-shrink:0;min-width:0;}
.av-img{width:36px;height:58px;border-radius:6px;overflow:visible;border:2px solid #2a3a55;position:relative;}
.av-name{font-family:"Cinzel",serif;font-size:10px;color:var(--text2);margin-top:2px;white-space:nowrap;}
.tl-box{background:linear-gradient(135deg,#1a1f30,#0f1420);border:1px solid #2a3a55;border-radius:12px;padding:5px 11px;text-align:center;min-width:62px;}
.tl-num{font-family:"Cinzel",serif;font-size:22px;font-weight:700;color:#e8d5a0;line-height:1;}
.tl-lbl{font-size:9px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.tl-bar-wrap{background:#0a0d18;border-radius:3px;height:5px;overflow:hidden;border:1px solid #2a3a55;width:100%;}
.tl-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#c8a830,#f4c842);transition:width .5s ease;}
.tl-xp{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0;}
.streak-inline{display:flex;align-items:center;gap:4px;}
.streak-num{font-family:"Cinzel",serif;font-size:18px;font-weight:700;line-height:1;}
.flame{display:inline-block;animation:flicker 1.4s ease-in-out infinite alternate;}
@keyframes flicker{0%{transform:scaleY(1) scaleX(1) rotate(-1deg);filter:brightness(1);}50%{transform:scaleY(1.08) scaleX(.96) rotate(1.5deg);filter:brightness(1.15);}100%{transform:scaleY(1.03) scaleX(1.01) rotate(-1deg);filter:brightness(1.05);}}
/* ── Primary Nav (5 tabs) ── */
.nav{display:flex;flex-direction:row;background:rgba(10,13,22,.95);border-bottom:1px solid var(--border);flex-shrink:0;width:100%;}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;border-bottom:3px solid transparent;padding:10px 4px;cursor:pointer;color:var(--text2);transition:all .2s;flex:1;}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{border-bottom-color:#f4c842;color:#e8d5a0;}
.nav-btn.more-active{border-bottom-color:#8b6fe8;color:#c8b4ff;}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-family:"Cinzel",serif;font-size:9px;font-weight:600;letter-spacing:.3px;white-space:nowrap;}
/* ── More Drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;bottom:0;left:0;right:0;max-width:680px;margin:0 auto;background:linear-gradient(180deg,#0d1220,#07090f);border-top:1px solid var(--border2);border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.1,.64,1);padding-bottom:calc(16px + var(--safe-bot));}
.drawer.open{transform:translateY(0);}
.drawer-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 16px;}
.drawer-title{font-family:"Cinzel",serif;font-size:11px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:14px;}
.drawer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 8px;}
.drawer-btn{display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 8px;cursor:pointer;color:var(--text2);transition:all .2s;}
.drawer-btn:active{transform:scale(.95);}
.drawer-btn.active{border-color:#f4c842;color:#e8d5a0;background:rgba(244,200,66,.06);}
.drawer-icon{font-size:24px;line-height:1;}
.drawer-label{font-family:"Cinzel",serif;font-size:9px;font-weight:600;letter-spacing:.3px;white-space:nowrap;}
.content{padding:16px;padding-bottom:calc(16px + var(--safe-bot));flex:1;overflow-x:hidden;}
.card{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.card-title{font-family:"Cinzel",serif;font-size:11px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
.domain-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.domain-card{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center;min-width:0;}
.domain-label{font-size:10px;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;}
.domain-level{font-family:"Cinzel",serif;font-size:20px;font-weight:700;line-height:1;}
.domain-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.xp-wrap{background:var(--bg);border:1px solid var(--border);border-radius:4px;height:7px;overflow:hidden;}
.xp-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.skill-row{margin-bottom:14px;}.skill-row:last-child{margin-bottom:0;}
.skill-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.skill-name{font-size:13px;color:var(--text);}
.skill-tag{font-size:11px;font-weight:600;letter-spacing:.3px;}
.skill-level{font-family:"Cinzel",serif;font-weight:600;font-size:13px;}
.skill-xp{font-size:11px;color:var(--text2);margin-left:6px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.filter-btn{background:transparent;border:1px solid var(--border);border-radius:20px;padding:4px 13px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s;font-family:'Crimson Text',serif;}
.filter-btn:hover{border-color:var(--border2);color:var(--text);}
.filter-btn.active{background:var(--bg3);border-color:var(--border2);color:#e8d5a0;}
.action-item{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:7px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;transition:border-color .15s,transform .15s;}
.action-item:active{transform:scale(.98);}
.action-item.legendary{box-shadow:0 0 16px rgba(244,200,66,.1);}
.action-done{opacity:.35;cursor:not-allowed;}
.action-label{font-size:14px;color:var(--text);margin-bottom:3px;}
.action-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:7px;font-style:italic;}
.action-tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.action-tag-pill{font-size:10px;border-radius:20px;padding:2px 9px;border:1px solid currentColor;opacity:.85;}
.action-xp{font-size:14px;font-family:"Cinzel",serif;font-weight:600;}
.action-gold{font-size:12px;color:var(--gold);margin-top:2px;}
.quest-item{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:12px;padding:14px 15px;margin-bottom:9px;}
.quest-item.done{opacity:.45;}
.quest-title{font-family:"Cinzel",serif;font-size:14px;color:#e8d5a0;margin-bottom:4px;}
.quest-desc{font-size:13px;color:var(--text2);margin-bottom:10px;font-style:italic;}
.quest-rewards{display:flex;gap:12px;font-size:12px;}
.complete-btn{background:transparent;border:1px solid var(--success);border-radius:8px;padding:7px 13px;cursor:pointer;color:var(--success);font-size:12px;font-family:"Cinzel",serif;letter-spacing:.5px;flex-shrink:0;margin-left:10px;}
.complete-btn:active{background:rgba(42,184,138,.15);}
.treasury{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.shop-card{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:14px;padding:15px 11px;text-align:center;cursor:pointer;transition:border-color .15s;}
.shop-card:active{transform:scale(.97);}
.shop-card.locked{opacity:.35;cursor:not-allowed;}
.shop-icon{font-size:28px;margin-bottom:7px;}
.shop-name{font-family:"Cinzel",serif;font-size:12px;color:#e8d5a0;margin-bottom:4px;}
.shop-desc{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.4;font-style:italic;}
.shop-price{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:20px;padding:3px 11px;display:inline-block;font-family:"Cinzel",serif;font-size:12px;font-weight:600;color:var(--gold);}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-label{font-size:13px;color:var(--text);}
.log-time{font-size:11px;color:var(--text3);margin-top:2px;}
.log-rewards{display:flex;gap:10px;font-size:12px;font-family:"Cinzel",serif;}
.purchase-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.purchase-item:last-child{border-bottom:none;}
.journal-tabs{display:flex;gap:8px;margin-bottom:14px;}
.journal-tab{flex:1;background:transparent;border:1px solid var(--border);border-radius:10px;padding:9px;cursor:pointer;font-family:"Cinzel",serif;font-size:11px;letter-spacing:.5px;color:var(--text2);transition:all .15s;text-align:center;}
.journal-tab.active-g{border-color:var(--journal-g);color:var(--journal-g);background:rgba(244,200,66,.05);}
.journal-tab.active-i{border-color:var(--journal-i);color:var(--journal-i);background:rgba(196,86,160,.05);}
.journal-box{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.journal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.journal-title{font-family:"Cinzel",serif;font-size:14px;color:#e8d5a0;}
.journal-subtitle{font-size:12px;color:var(--text2);margin-top:2px;font-style:italic;}
.xp-preview-val{font-family:"Cinzel",serif;font-size:17px;font-weight:700;}
.xp-preview-label{font-size:10px;color:var(--text2);}
.journal-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-family:'Crimson Text',serif;font-size:15px;line-height:1.7;resize:vertical;min-height:150px;outline:none;-webkit-appearance:none;}
.journal-textarea:focus{border-color:var(--border2);}
.journal-textarea::placeholder{color:var(--text3);font-style:italic;}
.journal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.journal-count{font-size:12px;color:var(--text3);}
.journal-count.enough{color:var(--success);}.journal-count.ten{color:var(--gold);}
.save-btn{border:none;border-radius:10px;padding:8px 20px;cursor:pointer;font-family:"Cinzel",serif;font-size:12px;font-weight:600;letter-spacing:.5px;}
.save-btn:disabled{opacity:.3;cursor:not-allowed;}
.save-btn-g{background:var(--journal-g);color:#1a1200;}
.save-btn-i{background:var(--journal-i);color:#fff;}
.journal-hint{font-size:12px;color:var(--text3);margin-top:8px;font-style:italic;line-height:1.5;}
.entry-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px;}
.entry-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.entry-date{font-size:11px;color:var(--text3);}
.entry-badge{font-family:"Cinzel",serif;font-size:11px;padding:2px 8px;border-radius:20px;}
.entry-badge-g{background:rgba(244,200,66,.12);color:var(--journal-g);border:1px solid rgba(244,200,66,.25);}
.entry-badge-i{background:rgba(196,86,160,.12);color:var(--journal-i);border:1px solid rgba(196,86,160,.25);}
.entry-items{list-style:none;}
.entry-item-row{font-size:13px;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:6px;}
.entry-item-row:last-child{border-bottom:none;}
.entry-num{font-family:"Cinzel",serif;font-size:11px;color:var(--text3);min-width:18px;}
.fj-search{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 13px;color:var(--text);font-family:'Crimson Text',serif;font-size:14px;outline:none;margin-bottom:12px;}
.fj-search::placeholder{color:var(--text3);}
.fj-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-family:'Crimson Text',serif;font-size:15px;line-height:1.7;resize:vertical;min-height:130px;outline:none;-webkit-appearance:none;}
.fj-textarea:focus{border-color:var(--border2);}
.fj-textarea::placeholder{color:var(--text3);font-style:italic;}
.fj-save-btn{background:var(--focus);border:none;border-radius:10px;padding:8px 20px;cursor:pointer;font-family:"Cinzel",serif;font-size:12px;font-weight:600;color:#fff;letter-spacing:.5px;}
.fj-save-btn:disabled{opacity:.3;cursor:not-allowed;}
.fj-entry{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px;}
.fj-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.fj-entry-date{font-size:11px;color:var(--text3);}
.fj-del-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 5px;}
.fj-del-btn:hover{color:var(--danger);}
.fj-body{font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
mark.hl{background:rgba(244,200,66,.28);border-radius:2px;}
.timer-ring-wrap{display:flex;justify-content:center;margin:14px 0;position:relative;}
.timer-ring-wrap svg{transform:rotate(-90deg);}
.timer-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.timer-display{font-family:"Cinzel",serif;font-size:60px;font-weight:700;color:#e8d5a0;letter-spacing:2px;line-height:1;transition:color .4s;}
.timer-display.warning{color:var(--danger);}.timer-display.finished{color:var(--gold);}
.timer-presets{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.timer-preset{background:transparent;border:1px solid var(--border);border-radius:20px;padding:4px 13px;cursor:pointer;font-family:"Cinzel",serif;font-size:11px;color:var(--text2);transition:all .15s;}
.timer-preset:hover{border-color:var(--border2);color:var(--text);}
.timer-preset.active{background:var(--bg3);border-color:var(--focus);color:var(--focus);}
.timer-adj-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px;}
.timer-adj-btn{background:var(--bg2);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:"Cinzel",serif;}
.timer-adj-btn:active{transform:scale(.9);}
.timer-mins-display{font-family:"Cinzel",serif;font-size:42px;font-weight:700;color:#e8d5a0;min-width:70px;text-align:center;}
.timer-mins-label{font-size:11px;color:var(--text2);text-align:center;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.timer-controls{display:flex;gap:10px;justify-content:center;margin-top:8px;}
.timer-btn{border:none;border-radius:14px;padding:12px 30px;font-family:"Cinzel",serif;font-size:13px;font-weight:600;letter-spacing:.5px;cursor:pointer;}
.timer-btn:active{transform:scale(.96);}
.timer-btn-start{background:var(--success);color:#fff;}
.timer-btn-pause{background:var(--gold);color:#1a1200;}
.timer-btn-stop{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:12px 20px;}
@keyframes flashRed{0%,100%{background:var(--bg)}50%{background:rgba(232,93,58,.2)}}
.flash-alarm{animation:flashRed .5s ease 6;}
.av-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.av-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:90vh;overflow-y:auto;}
.av-modal-title{font-family:"Cinzel",serif;font-size:16px;color:#e8d5a0;margin-bottom:4px;}
.av-modal-sub{font-size:12px;color:var(--text2);margin-bottom:13px;font-style:italic;}
.av-class-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:13px;}
.av-class-cell{border-radius:10px;padding:8px 5px;text-align:center;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--bg);}
.av-class-cell:active{transform:scale(.95);}
.av-class-label{font-family:"Cinzel",serif;font-size:10px;letter-spacing:.5px;margin-top:4px;color:var(--text2);}
.av-name-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:"Cinzel",serif;font-size:14px;outline:none;letter-spacing:1px;margin-bottom:9px;}
.av-name-input::placeholder{color:var(--text3);font-family:'Crimson Text',serif;letter-spacing:0;font-style:italic;}
.av-modal-save{width:100%;background:var(--focus);border:none;border-radius:10px;padding:11px;color:#fff;font-family:"Cinzel",serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px;}
.av-modal-close{width:100%;background:transparent;border:1px solid var(--border);border-radius:10px;padding:9px;color:var(--text2);font-family:"Cinzel",serif;font-size:12px;cursor:pointer;}
.empty{background:var(--bg2);border:1px dashed var(--border);border-radius:14px;padding:34px;text-align:center;color:var(--text3);font-size:14px;font-style:italic;}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#toast{position:fixed;bottom:calc(22px + var(--safe-bot));left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:10px 18px;font-family:"Cinzel",serif;font-size:12px;color:#e8d5a0;box-shadow:0 8px 32px rgba(0,0,0,.6);opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:999;letter-spacing:.5px;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
#toast.show{opacity:1;}
@media(max-width:500px){.domain-grid{grid-template-columns:repeat(2,1fr);}.shop-grid{grid-template-columns:1fr;}.timer-display{font-size:48px;}.tl-xp{display:none;}.hdr-game-sub{display:none;}.hdr-game-title{font-size:17px;letter-spacing:2px;}.streak-num{font-size:14px;}.gold-pill{padding:4px 7px;font-size:12px;}}

  /* ── Level Up Popup ── */
  #lvlup-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s;}
  #lvlup-overlay.show{background:rgba(0,0,0,.82);pointer-events:all;}
  #lvlup-box{transform:scale(0) rotate(-8deg);opacity:0;transition:transform .45s cubic-bezier(.34,1.56,.64,1),opacity .3s;text-align:center;padding:40px 32px;max-width:340px;width:90%;position:relative;}
  #lvlup-overlay.show #lvlup-box{transform:scale(1) rotate(0deg);opacity:1;}
  #lvlup-canvas{position:fixed;inset:0;z-index:9998;pointer-events:none;}
  .lvlup-title{font-family:"Cinzel",serif;font-size:13px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
  .lvlup-level{font-family:"Cinzel",serif;font-size:80px;font-weight:700;line-height:1;margin-bottom:4px;}
  .lvlup-skill{font-family:"Cinzel",serif;font-size:22px;font-weight:600;color:#e8d5a0;margin-bottom:6px;letter-spacing:1px;}
  .lvlup-sub{font-size:15px;color:var(--text2);margin-bottom:28px;font-style:italic;}
  .lvlup-close{background:transparent;border:1px solid var(--border2);border-radius:12px;padding:12px 32px;color:var(--text);font-family:"Cinzel",serif;font-size:13px;cursor:pointer;letter-spacing:1px;transition:all .15s;}
  .lvlup-close:hover{background:var(--bg3);border-color:var(--text2);}
  @keyframes lvlup-glow{0%,100%{text-shadow:0 0 20px currentColor,0 0 40px currentColor;}50%{text-shadow:0 0 40px currentColor,0 0 80px currentColor,0 0 120px currentColor;}}

  /* ── Daily Spin ── */
  .spin-wrapper{display:flex;flex-direction:column;align-items:center;padding:8px 0 20px;}
  .spin-outer{position:relative;width:280px;height:280px;margin:0 auto 24px;}
  .spin-canvas{display:block;}
  .spin-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:24px solid #f4c842;filter:drop-shadow(0 2px 6px rgba(244,200,66,.6));z-index:10;}
  .spin-btn{background:linear-gradient(135deg,#f4c842,#e8a820);border:none;border-radius:16px;padding:14px 44px;font-family:"Cinzel",serif;font-size:15px;font-weight:700;color:#1a1200;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 20px rgba(244,200,66,.4);transition:all .15s;}
  .spin-btn:active{transform:scale(.96);}
  .spin-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .spin-cooldown{font-family:"Cinzel",serif;font-size:13px;color:var(--text2);text-align:center;margin-top:12px;letter-spacing:.5px;}
  .spin-result{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border2);border-radius:14px;padding:18px 24px;text-align:center;margin-top:16px;width:100%;}
  .spin-result-icon{font-size:36px;margin-bottom:8px;}
  .spin-result-name{font-family:"Cinzel",serif;font-size:16px;color:#e8d5a0;margin-bottom:4px;}
  .spin-result-desc{font-size:13px;color:var(--text2);font-style:italic;}
  .spin-history{margin-top:16px;width:100%;}
  .spin-history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .spin-history-row:last-child{border-bottom:none;}

  /* ── Inventory & Chests ── */
  .inv-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .inv-card{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;}
  .inv-card-icon{font-size:28px;margin-bottom:6px;}
  .inv-card-val{font-family:"Cinzel",serif;font-size:22px;font-weight:700;color:#e8d5a0;line-height:1;}
  .inv-card-label{font-size:11px;color:var(--text2);margin-top:3px;letter-spacing:.5px;}
  .chest-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
  .chest-item{background:linear-gradient(135deg,var(--bg2),var(--bg));border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;}
  .chest-item.common{border:1px solid #c87a3a55;box-shadow:0 0 12px #c87a3a18;}
  .chest-item.rare{border:1px solid #4a8fff55;box-shadow:0 0 12px #4a8fff18;}
  .chest-item.legendary{border:1px solid #f4c84255;box-shadow:0 0 16px #f4c84222;}
  .chest-icon{font-size:36px;margin-right:14px;flex-shrink:0;}
  .chest-name{font-family:"Cinzel",serif;font-size:14px;color:#e8d5a0;margin-bottom:3px;}
  .chest-desc{font-size:12px;color:var(--text2);font-style:italic;}
  .chest-open-btn{border:none;border-radius:10px;padding:9px 18px;font-family:"Cinzel",serif;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;letter-spacing:.5px;transition:all .15s;}
  .chest-open-btn:active{transform:scale(.95);}
  .chest-open-btn.common{background:linear-gradient(135deg,#c87a3a,#a05a20);color:#fff;}
  .chest-open-btn.rare{background:linear-gradient(135deg,#4a8fff,#1a5fcc);color:#fff;}
  .chest-open-btn.legendary{background:linear-gradient(135deg,#f4c842,#c89820);color:#1a1200;}
  .chest-open-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
  .key-shop{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .key-shop-left{display:flex;align-items:center;gap:12px;}
  .key-shop-icon{font-size:32px;}
  .key-shop-name{font-family:"Cinzel",serif;font-size:14px;color:#e8d5a0;margin-bottom:2px;}
  .key-shop-desc{font-size:12px;color:var(--text2);font-style:italic;}
  .key-buy-btn{background:linear-gradient(135deg,#f4c842,#c89820);border:none;border-radius:10px;padding:9px 18px;font-family:"Cinzel",serif;font-size:12px;font-weight:600;color:#1a1200;cursor:pointer;letter-spacing:.5px;white-space:nowrap;}
  .key-buy-btn:active{transform:scale(.95);}
  .key-buy-btn:disabled{opacity:.35;cursor:not-allowed;}
  /* Chest open popup */
  .chest-popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;}
  .chest-popup{background:linear-gradient(135deg,#0f1a2a,#07090f);border-radius:20px;padding:36px 28px;text-align:center;max-width:320px;width:100%;}
  .chest-popup-opening{font-family:"Cinzel",serif;font-size:13px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
  .chest-popup-icon{font-size:72px;margin-bottom:16px;animation:chestBounce .6s cubic-bezier(.34,1.56,.64,1);}
  @keyframes chestBounce{0%{transform:scale(0) rotate(-10deg);}100%{transform:scale(1) rotate(0deg);}}
  .chest-popup-reward-icon{font-size:52px;margin-bottom:10px;animation:chestBounce .5s cubic-bezier(.34,1.56,.64,1) .2s both;}
  .chest-popup-reward-name{font-family:"Cinzel",serif;font-size:20px;font-weight:700;margin-bottom:6px;}
  .chest-popup-reward-desc{font-size:13px;color:var(--text2);margin-bottom:24px;font-style:italic;}
  .chest-popup-close{background:transparent;border:1px solid var(--border2);border-radius:12px;padding:11px 32px;color:var(--text);font-family:"Cinzel",serif;font-size:13px;cursor:pointer;letter-spacing:.5px;}
  .inv-history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .inv-history-row:last-child{border-bottom:none;}

  /* ── XP Boost Banner ── */
  .boost-banner{background:linear-gradient(90deg,#1a2a10,#0f1a08);border-bottom:1px solid #5ab83a44;padding:7px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .boost-banner-text{font-family:"Cinzel",serif;font-size:11px;color:#5ab83a;letter-spacing:.5px;}
  .boost-banner-icon{font-size:16px;animation:pulse 1.5s infinite;}
  .boost-badge{display:inline-block;background:rgba(90,184,58,.15);border:1px solid #5ab83a55;border-radius:20px;padding:2px 8px;font-family:"Cinzel",serif;font-size:10px;color:#5ab83a;margin-left:6px;}

  /* ── Export / Import ── */
  .save-mgmt{display:flex;gap:10px;margin-bottom:16px;}
  .save-mgmt-btn{flex:1;border:none;border-radius:10px;padding:11px;font-family:"Cinzel",serif;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.5px;transition:all .15s;}
  .save-mgmt-btn:active{transform:scale(.96);}
  .save-export-btn{background:linear-gradient(135deg,#1a3a5a,#0f2540);border:1px solid #2a5a8a;color:#7ab4ea;}
  .save-import-btn{background:linear-gradient(135deg,#1a3a1a,#0f2510);border:1px solid #2a6a2a;color:#5ab87a;}
  .save-mgmt-note{font-size:11px;color:var(--text3);font-style:italic;text-align:center;margin-bottom:14px;line-height:1.5;}

  /* ── Quest System ── */
  .quest-section-title{font-family:"Cinzel",serif;font-size:11px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .quest-section-title span{flex:1;height:1px;background:var(--border);}
  .quest-progress-wrap{background:var(--bg);border-radius:3px;height:5px;overflow:hidden;margin-top:6px;}
  .quest-progress-bar{height:100%;border-radius:3px;transition:width .5s ease;}
  .quest-progress-label{font-size:11px;color:var(--text2);margin-top:3px;}
  .quest-tag{font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px;font-family:"Cinzel",serif;letter-spacing:.5px;}
  .quest-tag-daily{background:rgba(74,143,255,.15);color:#4a8fff;border:1px solid rgba(74,143,255,.3);}
  .quest-tag-weekly{background:rgba(139,111,232,.15);color:#8b6fe8;border:1px solid rgba(139,111,232,.3);}
  .quest-tag-weekend{background:rgba(244,200,66,.15);color:#f4c842;border:1px solid rgba(244,200,66,.3);}
  .quest-tag-custom{background:rgba(42,184,138,.15);color:#2ab88a;border:1px solid rgba(42,184,138,.3);}
  .quest-tag-auto{background:rgba(232,93,58,.15);color:#e85d3a;border:1px solid rgba(232,93,58,.3);}
  .quest-item.rotating{border-style:dashed;}
  /* Custom quest form */
  .cq-form{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
  .cq-form-title{font-family:"Cinzel",serif;font-size:13px;color:#e8d5a0;margin-bottom:14px;}
  .cq-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Crimson Text',serif;font-size:14px;outline:none;margin-bottom:8px;}
  .cq-input:focus{border-color:var(--border2);}
  .cq-input::placeholder{color:var(--text3);font-style:italic;}
  .cq-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .cq-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Crimson Text',serif;font-size:14px;outline:none;}
  .cq-add-btn{width:100%;background:linear-gradient(135deg,#2ab88a,#1a8a6a);border:none;border-radius:10px;padding:11px;color:#fff;font-family:"Cinzel",serif;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.5px;margin-top:4px;}
  .cq-add-btn:active{transform:scale(.97);}
  .quest-del-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px;margin-left:6px;flex-shrink:0;}
  .quest-del-btn:hover{color:var(--danger);}
  /* Quest complete popup */
  .qc-popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;}
  .qc-popup{background:linear-gradient(135deg,#0f1a2a,#07090f);border-radius:20px;padding:36px 28px;text-align:center;max-width:320px;width:100%;animation:qcBounce .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes qcBounce{0%{transform:scale(0) rotate(-5deg);}100%{transform:scale(1) rotate(0);}}
  .qc-icon{font-size:60px;margin-bottom:12px;}
  .qc-title{font-family:"Cinzel",serif;font-size:22px;font-weight:700;color:#f4c842;margin-bottom:6px;}
  .qc-name{font-family:"Cinzel",serif;font-size:14px;color:#e8d5a0;margin-bottom:16px;}
  .qc-rewards{display:flex;justify-content:center;gap:16px;margin-bottom:20px;}
  .qc-reward{background:rgba(255,255,255,.05);border-radius:10px;padding:10px 16px;text-align:center;}
  .qc-reward-val{font-family:"Cinzel",serif;font-size:18px;font-weight:700;}
  .qc-reward-lbl{font-size:11px;color:var(--text2);margin-top:2px;}
  .qc-close{background:transparent;border:1px solid var(--border2);border-radius:12px;padding:11px 32px;color:var(--text);font-family:"Cinzel",serif;font-size:13px;cursor:pointer;letter-spacing:.5px;}

  /* ── Cosmetics ── */
  .cosm-section{margin-top:16px;}
  .cosm-title{font-family:"Cinzel",serif;font-size:11px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
  .cosm-class-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
  .cosm-cell{border-radius:10px;padding:8px 5px;text-align:center;cursor:pointer;border:1px solid var(--border);background:var(--bg);position:relative;transition:all .15s;}
  .cosm-cell:active{transform:scale(.95);}
  .cosm-cell.selected{border:2px solid #f4c842;background:var(--bg3);}
  .cosm-cell.locked{opacity:.6;cursor:pointer;}
  .cosm-cell.locked.can-afford:hover{border-color:#2ab88a;box-shadow:0 0 10px #2ab88a44;opacity:1;}
  .cosm-cell.locked.cant-afford{opacity:.4;cursor:not-allowed;}
  .cosm-cell.locked.cant-afford:hover{border-color:var(--danger);box-shadow:0 0 8px #e85d3a33;}
  .cosm-cell-label{font-family:"Cinzel",serif;font-size:9px;letter-spacing:.3px;margin-top:4px;color:var(--text2);}
  .cosm-cell-price{font-size:9px;color:var(--gold);margin-top:2px;}
  .cosm-lock-badge{position:absolute;top:4px;right:4px;font-size:10px;}
  .cosm-acc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .cosm-acc-cell{border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;border:1px solid var(--border);background:var(--bg);transition:all .2s;}
  .cosm-acc-cell:active{transform:scale(.95);}
  .cosm-acc-cell.equipped{border:2px solid #2ab88a;background:rgba(42,184,138,.08);}
  .cosm-acc-cell.locked{opacity:.6;cursor:pointer;}
  .cosm-acc-cell.locked.can-afford:hover{border-color:#2ab88a;box-shadow:0 0 10px #2ab88a44;opacity:1;}
  .cosm-acc-cell.locked-hint{opacity:.5;cursor:pointer;}
  .cosm-acc-cell.locked-hint:hover{opacity:.75;border-color:var(--border2);}
  .cosm-acc-icon{font-size:22px;}
  .cosm-acc-label{font-family:"Cinzel",serif;font-size:8px;color:var(--text2);margin-top:4px;white-space:nowrap;}
  /* Accessory overlay on avatar */
  .av-accessory{position:absolute;top:-6px;right:-6px;font-size:14px;line-height:1;}

  /* ── Gems Currency ── */
  .gems-pill{background:linear-gradient(135deg,#1a0a2a,#0f0518);border:1px solid #6a2a9a55;border-radius:20px;padding:4px 10px;font-family:"Cinzel",serif;font-size:12px;font-weight:600;color:#c87ae8;white-space:nowrap;}
  /* ── Rotating Shop ── */
  .rot-shop-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .rot-shop-title{font-family:"Cinzel",serif;font-size:11px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;}
  .rot-slots{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .rot-slot{background:linear-gradient(135deg,#0f1a2a,#07090f);border-radius:14px;padding:14px 12px;text-align:center;position:relative;overflow:hidden;}
  .rot-slot.tier1{border:1px solid #f4c84244;}
  .rot-slot.tier2{border:1px solid #8b6fe844;box-shadow:0 0 12px #8b6fe811;}
  .rot-slot.tier3{border:1px solid #c87ae844;box-shadow:0 0 16px #c87ae822;}
  .rot-slot-badge{position:absolute;top:8px;right:8px;font-size:8px;font-family:"Cinzel",serif;padding:2px 6px;border-radius:10px;letter-spacing:.5px;}
  .rot-slot.tier1 .rot-slot-badge{background:rgba(244,200,66,.15);color:#f4c842;}
  .rot-slot.tier2 .rot-slot-badge{background:rgba(139,111,232,.15);color:#8b6fe8;}
  .rot-slot.tier3 .rot-slot-badge{background:rgba(200,122,232,.15);color:#c87ae8;}
  .rot-icon{font-size:30px;margin-bottom:8px;}
  .rot-name{font-family:"Cinzel",serif;font-size:12px;color:#e8d5a0;margin-bottom:4px;}
  .rot-desc{font-size:11px;color:var(--text2);margin-bottom:10px;font-style:italic;line-height:1.4;}
  .rot-cost{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
  .rot-cost-gold{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:12px;padding:2px 8px;font-family:"Cinzel",serif;font-size:11px;color:var(--gold);}
  .rot-cost-gems{background:rgba(200,122,232,.1);border:1px solid #c87ae844;border-radius:12px;padding:2px 8px;font-family:"Cinzel",serif;font-size:11px;color:#c87ae8;}
  .rot-buy-btn{border:none;border-radius:8px;padding:7px 14px;font-family:"Cinzel",serif;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.5px;width:100%;transition:all .15s;}
  .rot-buy-btn:active{transform:scale(.96);}
  .rot-buy-btn.tier1{background:linear-gradient(135deg,#c8a830,#f4c842);color:#1a1200;}
  .rot-buy-btn.tier2{background:linear-gradient(135deg,#5a3a8a,#8b6fe8);color:#fff;}
  .rot-buy-btn.tier3{background:linear-gradient(135deg,#8a2aaa,#c87ae8);color:#fff;}
  .rot-buy-btn:disabled{opacity:.35;cursor:not-allowed;}
  .rot-timer{font-size:10px;color:var(--text3);margin-top:6px;font-family:"Cinzel",serif;letter-spacing:.3px;}
  .rot-timer.urgent{color:var(--danger);}

  /* ── Pets ── */
  .pet-active-slots{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .pet-slot{background:linear-gradient(135deg,#0f1a2a,#07090f);border-radius:16px;padding:16px 12px;text-align:center;position:relative;}
  .pet-slot.empty{border:2px dashed var(--border);cursor:pointer;}
  .pet-slot.empty:hover{border-color:var(--border2);}
  .pet-slot.filled{border:1px solid var(--border2);box-shadow:0 0 12px rgba(122,180,234,.1);}
  .pet-slot.evolved{border:1px solid #f4c84255;box-shadow:0 0 16px rgba(244,200,66,.15);}
  .pet-slot.locked{opacity:.7;}
  .pet-slot-icon{font-size:42px;margin-bottom:8px;line-height:1;}
  .pet-slot-name{font-family:"Cinzel",serif;font-size:13px;color:#e8d5a0;margin-bottom:4px;}
  .pet-slot-bonus{font-size:11px;color:var(--success);font-style:italic;margin-bottom:10px;line-height:1.4;}
  .pet-slot-swap{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:5px 12px;cursor:pointer;font-family:"Cinzel",serif;font-size:10px;color:var(--text2);transition:all .15s;}
  .pet-slot-swap:active{transform:scale(.95);}
  .pet-slot-swap:disabled{opacity:.35;cursor:not-allowed;}
  .pet-slot-cooldown{font-size:10px;color:var(--danger);margin-top:6px;font-family:"Cinzel",serif;}
  .pet-slot-empty-text{font-size:12px;color:var(--text3);font-style:italic;margin-top:8px;}
  .pet-stable-title{font-family:"Cinzel",serif;font-size:11px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;margin-top:4px;}
  .pet-stable-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
  .pet-card{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s;position:relative;}
  .pet-card:active{transform:scale(.95);}
  .pet-card.active-pet{border-color:#2ab88a;box-shadow:0 0 10px #2ab88a33;}
  .pet-card.evolved-pet{border-color:#f4c84266;box-shadow:0 0 12px #f4c84222;}
  .pet-card-icon{font-size:28px;margin-bottom:6px;}
  .pet-card-name{font-family:"Cinzel",serif;font-size:10px;color:#e8d5a0;margin-bottom:3px;}
  .pet-card-bonus{font-size:9px;color:var(--text2);font-style:italic;line-height:1.3;}
  .pet-active-badge{position:absolute;top:4px;right:4px;font-size:8px;background:#2ab88a22;border:1px solid #2ab88a44;color:#2ab88a;border-radius:6px;padding:1px 4px;font-family:"Cinzel",serif;}
  .pet-evolve-section{background:linear-gradient(135deg,#1a1208,#0f0a04);border:1px solid #f4c84233;border-radius:14px;padding:16px;margin-bottom:14px;text-align:center;}
  .pet-evolve-title{font-family:"Cinzel",serif;font-size:13px;color:#f4c842;margin-bottom:6px;}
  .pet-evolve-desc{font-size:12px;color:var(--text2);margin-bottom:12px;font-style:italic;}
  .pet-evolve-btn{background:linear-gradient(135deg,#c8a830,#f4c842);border:none;border-radius:10px;padding:10px 24px;font-family:"Cinzel",serif;font-size:12px;font-weight:600;color:#1a1200;cursor:pointer;}
  .pet-evolve-btn:active{transform:scale(.96);}
  /* Pet picker modal */
  .pet-picker-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
  .pet-picker{background:linear-gradient(180deg,#0d1220,#07090f);border-top:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-width:680px;max-height:80vh;overflow-y:auto;}
  .pet-picker-title{font-family:"Cinzel",serif;font-size:14px;color:#e8d5a0;margin-bottom:4px;text-align:center;}
  .pet-picker-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:14px;font-style:italic;}
  .pet-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
  .pet-picker-close{width:100%;background:transparent;border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text2);font-family:"Cinzel",serif;font-size:12px;cursor:pointer;}

  /* ── Onboarding ── */
  .ob-screen{position:fixed;inset:0;background:linear-gradient(180deg,#050810,#07090f);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
  .ob-logo{font-family:"Cinzel",serif;font-size:28px;font-weight:700;letter-spacing:6px;background:linear-gradient(135deg,#f4c842,#e8923a,#f4c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 16px rgba(244,200,66,.5));margin-bottom:8px;}
  .ob-tagline{font-size:14px;color:var(--text2);font-style:italic;margin-bottom:48px;letter-spacing:.5px;}
  .ob-title{font-family:"Cinzel",serif;font-size:20px;color:#e8d5a0;margin-bottom:8px;letter-spacing:1px;}
  .ob-sub{font-size:13px;color:var(--text2);margin-bottom:32px;line-height:1.6;max-width:320px;}
  .ob-input{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px 18px;font-family:'Crimson Text',Georgia,serif;font-size:16px;color:#e8d5a0;width:100%;max-width:300px;text-align:center;outline:none;margin-bottom:24px;box-sizing:border-box;text-transform:none;}
  .ob-input:focus{border-color:#f4c842;box-shadow:0 0 12px rgba(244,200,66,.2);}
  .ob-btn{background:linear-gradient(135deg,#c8a830,#f4c842);border:none;border-radius:14px;padding:14px 40px;font-family:"Cinzel",serif;font-size:14px;font-weight:700;color:#1a1200;cursor:pointer;letter-spacing:.5px;transition:all .2s;margin-bottom:12px;}
  .ob-btn:active{transform:scale(.97);}
  .ob-skip{background:transparent;border:none;font-size:12px;color:var(--text3);cursor:pointer;font-family:"Cinzel",serif;letter-spacing:.3px;padding:8px;}
  .ob-back{background:transparent;border:1px solid var(--border);border-radius:10px;padding:7px 14px;font-family:"Cinzel",serif;font-size:11px;color:var(--text2);cursor:pointer;letter-spacing:.3px;align-self:flex-start;margin-bottom:20px;}
  .ob-class-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:400px;margin-bottom:28px;}
  .ob-class-cell{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 8px;cursor:pointer;transition:all .2s;position:relative;}
  .ob-class-cell:active{transform:scale(.95);}
  .ob-class-cell.selected{border:2px solid #f4c842;background:var(--bg3);box-shadow:0 0 14px rgba(244,200,66,.2);}
  .ob-class-icon{font-size:28px;margin-bottom:6px;}
  .ob-class-name{font-family:"Cinzel",serif;font-size:11px;color:#e8d5a0;margin-bottom:4px;}
  .ob-class-bonus{font-size:9px;color:var(--text2);font-style:italic;line-height:1.3;}
  /* Carousel */
  .ob-carousel{display:flex;align-items:center;gap:16px;width:100%;max-width:340px;margin-bottom:28px;}
  .ob-carousel-arrow{background:transparent;border:1px solid var(--border2);border-radius:50%;width:44px;height:44px;flex-shrink:0;font-size:20px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .ob-carousel-arrow:active{transform:scale(.9);border-color:#f4c842;color:#f4c842;}
  .ob-carousel-card{flex:1;background:var(--bg2);border:2px solid #f4c842;border-radius:20px;padding:28px 20px;text-align:center;box-shadow:0 0 20px rgba(244,200,66,.15);}
  .ob-carousel-icon{font-size:52px;margin-bottom:12px;}
  .ob-carousel-name{font-family:"Cinzel",serif;font-size:20px;color:#e8d5a0;margin-bottom:8px;letter-spacing:1px;}
  .ob-carousel-bonus{font-size:13px;color:#2ab88a;font-style:italic;margin-bottom:6px;}
  .ob-carousel-desc{font-size:12px;color:var(--text3);line-height:1.5;}
  .ob-carousel-dots{display:flex;gap:6px;justify-content:center;margin-bottom:24px;}
  .ob-carousel-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:all .2s;}
  .ob-carousel-dot.active{background:#f4c842;width:16px;border-radius:3px;}
  .ob-tour-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px 20px;max-width:320px;width:100%;margin-bottom:28px;}
  .ob-tour-icon{font-size:40px;margin-bottom:12px;}
  .ob-tour-name{font-family:"Cinzel",serif;font-size:16px;color:#e8d5a0;margin-bottom:8px;}
  .ob-tour-desc{font-size:13px;color:var(--text2);line-height:1.6;}
  .ob-dots{display:flex;gap:8px;justify-content:center;margin-bottom:28px;}
  .ob-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .2s;}
  .ob-dot.active{background:#f4c842;width:20px;border-radius:4px;}
  .ob-progress{font-size:11px;color:var(--text3);margin-bottom:20px;font-family:"Cinzel",serif;letter-spacing:.5px;}

  /* ── Hero Profile ── */
  .hero-page{max-width:480px;margin:0 auto;padding:8px 0 24px;}
  /* Main character card */
  .hero-main-card{background:linear-gradient(160deg,#0f1828,#080e1a);border:1px solid var(--border2);border-radius:20px;margin:0 16px 12px;overflow:hidden;position:relative;}
  .hero-main-card::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(244,200,66,.06),transparent 60%);pointer-events:none;}
  .hero-card-top{display:flex;align-items:center;gap:16px;padding:16px;position:relative;}
  .hero-card-info{display:flex;flex-direction:column;flex:1;min-width:0;}
  .hero-av-wrap{display:inline-block;position:relative;flex-shrink:0;}
  .hero-av-img{width:70px;height:114px;border-radius:10px;overflow:visible;position:relative;}
  .hero-av-ring{position:absolute;top:-3px;left:-3px;right:-3px;bottom:-3px;border-radius:13px;border:2px solid transparent;pointer-events:none;}
  .hero-av-accessory{position:absolute;top:-8px;right:-8px;font-size:18px;}
  .hero-name{font-family:"Cinzel",serif;font-size:22px;font-weight:700;color:#e8d5a0;margin-bottom:6px;letter-spacing:1px;}
  .hero-class-badge{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:5px 14px;font-family:"Cinzel",serif;font-size:12px;margin-bottom:4px;border:1px solid;}
  .hero-title-badge{font-family:"Cinzel",serif;font-size:11px;color:#f4c842;letter-spacing:1px;font-style:italic;margin-bottom:16px;}
  /* Key stats strip */
  .hero-stats-strip{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);}
  .hero-strip-stat{padding:14px 8px;text-align:center;border-right:1px solid var(--border);}
  .hero-strip-stat:last-child{border-right:none;}
  .hero-strip-val{font-family:"Cinzel",serif;font-size:18px;font-weight:700;color:#f4c842;line-height:1;}
  .hero-strip-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
  /* Section cards */
  .hero-section-card{background:linear-gradient(135deg,#0d1520,#080e1a);border:1px solid var(--border);border-radius:16px;margin:0 16px 10px;padding:14px 16px;}
  .hero-section-title{font-family:"Cinzel",serif;font-size:10px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
  /* Class bonus */
  .hero-class-bonus-row{display:flex;align-items:center;gap:12px;}
  .hero-class-bonus-icon{font-size:28px;}
  .hero-class-bonus-name{font-family:"Cinzel",serif;font-size:13px;color:#e8d5a0;margin-bottom:2px;}
  .hero-class-bonus-text{font-size:12px;color:var(--success);font-style:italic;}
  /* Chronicle grid */
  .hero-chronicle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .hero-chronicle-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;}
  .hero-chronicle-icon{font-size:18px;}
  .hero-chronicle-val{font-family:"Cinzel",serif;font-size:15px;font-weight:700;color:#e8d5a0;}
  .hero-chronicle-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;}
  /* Companions */
  .hero-companions{display:flex;gap:8px;}
  .hero-companion{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;flex:1;text-align:center;}
  .hero-companion-icon{font-size:24px;margin-bottom:3px;}
  .hero-companion-name{font-family:"Cinzel",serif;font-size:9px;color:#e8d5a0;}
  .hero-companion-bonus{font-size:9px;color:var(--text2);font-style:italic;margin-top:1px;}
  /* Titles */
  .hero-titles{display:flex;flex-wrap:wrap;gap:6px;}
  .hero-title-chip{background:rgba(244,200,66,.08);border:1px solid rgba(244,200,66,.25);border-radius:20px;padding:4px 11px;font-family:"Cinzel",serif;font-size:10px;color:#f4c842;}
  /* Share button */
  .hero-share-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#c8a830,#f4c842);border:none;border-radius:14px;padding:14px;font-family:"Cinzel",serif;font-size:13px;font-weight:700;color:#1a1200;cursor:pointer;width:calc(100% - 32px);margin:4px 16px 0;letter-spacing:.5px;}
  .hero-share-btn:active{transform:scale(.98);}

  /* ── Daily Challenge ── */
  .dc-banner{background:linear-gradient(135deg,#1a0a2a,#0f0518);border:1px solid #8b6fe844;border-radius:14px;padding:14px 16px;margin-bottom:12px;position:relative;overflow:hidden;}
  .dc-banner::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(139,111,232,.05),transparent);pointer-events:none;}
  .dc-banner-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .dc-banner-title{font-family:"Cinzel",serif;font-size:10px;color:#8b6fe8;letter-spacing:1.5px;text-transform:uppercase;}
  .dc-banner-timer{font-size:10px;color:var(--text3);font-family:"Cinzel",serif;}
  .dc-banner-timer.urgent{color:var(--danger);}
  .dc-banner-desc{font-size:13px;color:#e8d5a0;margin-bottom:8px;line-height:1.5;}
  .dc-banner-reward{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .dc-banner-reward-chip{background:rgba(244,200,66,.1);border:1px solid rgba(244,200,66,.3);border-radius:10px;padding:3px 10px;font-size:11px;color:#f4c842;font-family:"Cinzel",serif;}
  .dc-banner-progress{background:var(--bg);border-radius:4px;height:6px;margin-top:10px;overflow:hidden;}
  .dc-banner-fill{height:100%;background:linear-gradient(90deg,#8b6fe8,#c87ae8);border-radius:4px;transition:width .3s;}
  .dc-banner-done{font-size:11px;color:var(--success);font-family:"Cinzel",serif;margin-top:6px;}

  /* ── Sudden Event Popup ── */
  .event-popup{position:fixed;top:80px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:380px;background:linear-gradient(135deg,#0f1a0a,#07090f);border:1px solid #2ab88a55;border-radius:16px;padding:16px;z-index:8000;box-shadow:0 8px 32px rgba(42,184,138,.2);animation:slideDown .4s cubic-bezier(.34,1.1,.64,1);}
  @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  .event-popup-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .event-popup-icon{font-size:28px;}
  .event-popup-title{font-family:"Cinzel",serif;font-size:14px;color:#2ab88a;}
  .event-popup-desc{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5;font-style:italic;}
  .event-popup-timer{font-size:11px;color:#f4c842;font-family:"Cinzel",serif;margin-bottom:10px;}
  .event-popup-close{position:absolute;top:10px;right:12px;background:transparent;border:none;color:var(--text3);font-size:16px;cursor:pointer;}
  .event-popup-btn{background:linear-gradient(135deg,#1a8a5a,#2ab88a);border:none;border-radius:10px;padding:9px 20px;font-family:"Cinzel",serif;font-size:11px;color:#fff;cursor:pointer;width:100%;}

  /* ── Surprise Merchant ── */
  .merchant-popup{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:8500;display:flex;align-items:center;justify-content:center;padding:20px;}
  .merchant-card{background:linear-gradient(135deg,#1a1208,#0f0a04);border:1px solid #f4c84255;border-radius:20px;padding:24px 20px;max-width:340px;width:100%;text-align:center;box-shadow:0 0 40px rgba(244,200,66,.15);}
  .merchant-icon{font-size:52px;margin-bottom:8px;}
  .merchant-title{font-family:"Cinzel",serif;font-size:18px;color:#f4c842;margin-bottom:4px;}
  .merchant-sub{font-size:12px;color:var(--text2);font-style:italic;margin-bottom:16px;}
  .merchant-timer{font-family:"Cinzel",serif;font-size:13px;color:var(--danger);margin-bottom:16px;}
  .merchant-item{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:14px;margin-bottom:12px;text-align:left;display:flex;align-items:center;gap:12px;}
  .merchant-item-icon{font-size:28px;}
  .merchant-item-name{font-family:"Cinzel",serif;font-size:13px;color:#e8d5a0;margin-bottom:3px;}
  .merchant-item-desc{font-size:11px;color:var(--text2);font-style:italic;}
  .merchant-item-cost{font-family:"Cinzel",serif;font-size:12px;color:#f4c842;margin-top:4px;}
  .merchant-buy-btn{background:linear-gradient(135deg,#c8a830,#f4c842);border:none;border-radius:10px;padding:11px;font-family:"Cinzel",serif;font-size:12px;font-weight:700;color:#1a1200;cursor:pointer;width:100%;margin-bottom:8px;}
  .merchant-close-btn{background:transparent;border:1px solid var(--border);border-radius:10px;padding:9px;font-family:"Cinzel",serif;font-size:11px;color:var(--text2);cursor:pointer;width:100%;}

  /* ── Supabase Sync ── */
  .sync-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;display:flex;align-items:center;justify-content:center;padding:24px;}
  .sync-card{background:linear-gradient(135deg,#0d1220,#07090f);border:1px solid var(--border2);border-radius:20px;padding:28px 24px;max-width:340px;width:100%;text-align:center;}
  .sync-logo{font-family:"Cinzel",serif;font-size:22px;color:#f4c842;margin-bottom:4px;letter-spacing:3px;}
  .sync-sub{font-size:12px;color:var(--text2);margin-bottom:24px;font-style:italic;}
  .sync-input{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:14px;color:#e8d5a0;width:100%;box-sizing:border-box;margin-bottom:10px;outline:none;font-family:'Crimson Text',Georgia,serif;text-transform:none;}
  .sync-input:focus{border-color:#f4c842;}
  .sync-btn{background:linear-gradient(135deg,#c8a830,#f4c842);border:none;border-radius:12px;padding:13px;font-family:"Cinzel",serif;font-size:13px;font-weight:700;color:#1a1200;cursor:pointer;width:100%;margin-bottom:8px;letter-spacing:.5px;}
  .sync-btn:active{transform:scale(.97);}
  .sync-btn-secondary{background:transparent;border:1px solid var(--border);border-radius:12px;padding:11px;font-family:"Cinzel",serif;font-size:12px;color:var(--text2);cursor:pointer;width:100%;margin-bottom:8px;}
  .sync-status{font-size:11px;color:var(--text3);margin-top:8px;font-style:italic;}
  .sync-status.ok{color:var(--success);}
  .sync-status.err{color:var(--danger);}
  .sync-indicator{position:fixed;bottom:80px;right:12px;font-size:10px;font-family:"Cinzel",serif;color:var(--text3);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;z-index:500;opacity:.8;}
  .sync-indicator.syncing{color:#f4c842;}
  .sync-indicator.synced{color:var(--success);}
  .sync-indicator.error{color:var(--danger);}

  /* ── Floating XP Pop ── */
  .xp-pop{position:fixed;pointer-events:none;z-index:9000;display:flex;flex-direction:column;align-items:center;gap:2px;animation:xpPopFloat .9s ease-out forwards;}
  .xp-pop-xp{font-family:"Cinzel",serif;font-size:18px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.8);}
  .xp-pop-gold{font-family:"Cinzel",serif;font-size:13px;color:#f4c842;text-shadow:0 2px 8px rgba(0,0,0,.8);}
  @keyframes xpPopFloat{0%{opacity:1;transform:translateY(0) scale(1);}60%{opacity:1;transform:translateY(-48px) scale(1.1);}100%{opacity:0;transform:translateY(-80px) scale(.9);}}

  /* ── Update Banner ── */
  .update-banner{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#1a2a1a,#0a1a0a);border-bottom:1px solid #2ab88a55;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:99999;animation:slideDown .3s ease;}
  .update-banner-text{font-family:"Cinzel",serif;font-size:11px;color:#2ab88a;}
  .update-banner-btn{background:#2ab88a;border:none;border-radius:8px;padding:6px 14px;font-family:"Cinzel",serif;font-size:11px;font-weight:700;color:#fff;cursor:pointer;}

  /* ── Password Recovery Modal ── */

.ch{position:relative;overflow:visible;display:inline-block;}

function getSkinOverride(){
  if(typeof G==="undefined"||!G.equippedSkin||G.equippedSkin==="default")return null;
  var skin=SKINS.filter(function(s){return s.id===G.equippedSkin;})[0];
  return skin||null;
}

function drawSVG(classId,level,px){
  var skin=getSkinOverride();
  var sc=px/80;
  // Characters are ~130 units tall on an 80-unit wide base
  var charH=Math.round(130*sc);
  var html='<div class="ch" style="width:'+px+'px;height:'+charH+'px;background:#0d1220;border-radius:'+(px>50?'14px':'8px')+';overflow:visible;position:relative;">';
  html+=buildChar(classId,level,px,skin);
  html+='</div>';
  return html;
}

function buildChar(classId,level,px,skin){
  var sc=px/80;
  function p(x,y,w,h,col,r,extra){
    r=r||0;extra=extra||'';
    return '<div style="left:'+Math.round(x*sc)+'px;bottom:'+Math.round(y*sc)+'px;width:'+Math.round(w*sc)+'px;height:'+Math.round(h*sc)+'px;background:'+col+';border-radius:'+Math.round(r*sc)+'px;'+extra+'"></div>';
  }
  function pb(x,y,w,h,col,r,extra){ return '<div style="position:absolute;left:'+Math.round(x*sc)+'px;bottom:'+Math.round(y*sc)+'px;width:'+Math.round(w*sc)+'px;height:'+Math.round(h*sc)+'px;background:'+col+';border-radius:'+Math.round(r*sc)+'px;'+(extra||'')+'"></div>';}
  function brd(x,y,w,h,col,r,extra){ return '<div style="position:absolute;left:'+Math.round(x*sc)+'px;bottom:'+Math.round(y*sc)+'px;width:'+Math.round(w*sc)+'px;height:'+Math.round(h*sc)+'px;border:'+Math.ceil(1.5*sc)+'px solid '+col+';border-radius:'+Math.round(r*sc)+'px;'+(extra||'')+'"></div>';}

  // Skin colors
  var skinCol="#c8965a";
  if(skin&&skin.palette){skinCol=skin.palette.sk||skinCol;}

  var out='';

  if(classId===0){ // WARRIOR — plate armor with runes
    var ac=skin?skin.palette.ar:"#4a5a6a";
    var ac2=skin?skin.palette.tr:"#3a4a5a";
    var ec=skin?skin.palette.ey:"#4a8fff";
    out+=pb(26,0,12,30,ac2,4); // leg L
    out+=pb(42,0,12,30,ac2,4); // leg R
    out+=pb(24,0,14,8,"#1a2a3a",3); // boot L
    out+=pb(42,0,14,8,"#1a2a3a",3); // boot R
    out+=pb(14,26,52,40,ac,6); // body
    out+=pb(18,36,44,24,ac,5); // chest plate
    out+=brd(26,40,28,14,ec+'55',3,'animation:rune-glow 3s ease-in-out infinite;'); // chest rune
    out+=brd(18,40,8,8,ec+'44',8,'animation:rune-glow 3s ease-in-out infinite .5s;'); // rune dot L
    out+=brd(54,40,8,8,ec+'44',8,'animation:rune-glow 3s ease-in-out infinite 1s;'); // rune dot R
    out+=pb(4,30,10,28,ac2,5); // arm L
    out+=pb(66,30,10,28,ac2,5); // arm R
    out+=pb(3,48,12,4,ec+'55',2,'animation:rune-glow 3s ease-in-out infinite .3s;'); // band L
    out+=pb(65,48,12,4,ec+'55',2,'animation:rune-glow 3s ease-in-out infinite .3s;'); // band R
    out+=pb(2,54,14,12,ac,5); // pauldron L
    out+=pb(64,54,14,12,ac,5); // pauldron R
    out+=brd(4,56,12,8,ec+'44',2,'animation:rune-glow 3s ease-in-out infinite .8s;'); // pauldron rune L
    out+=brd(64,56,12,8,ec+'44',2,'animation:rune-glow 3s ease-in-out infinite .8s;'); // pauldron rune R
    out+=pb(30,64,20,8,skinCol,3); // neck
    out+=pb(18,70,44,32,skinCol,8); // head
    out+=pb(16,88,48,18,"#2a3a4a",6); // helmet
    out+=pb(20,84,40,10,"#1a2a3a",2); // visor
    out+=pb(22,96,10,4,ec+'aa',2,'box-shadow:0 0 '+Math.ceil(5*sc)+'px '+ec+'88;animation:rune-glow 2s ease-in-out infinite;'); // eye L
    out+=pb(48,96,10,4,ec+'aa',2,'box-shadow:0 0 '+Math.ceil(5*sc)+'px '+ec+'88;animation:rune-glow 2s ease-in-out infinite;'); // eye R
    out+=pb(22,94,36,3,ec+'44',1,'animation:rune-glow 3s ease-in-out infinite .2s;'); // helmet stripe
    // sword
    if(px>=60){out+=pb(72,14,4,52,"#aabaca",2)+'<div style="position:absolute;left:'+Math.round(68*sc)+'px;bottom:'+Math.round(14*sc)+'px;width:'+Math.round(12*sc)+'px;height:'+Math.round(4*sc)+'px;background:#c8a830;border-radius:2px;"></div>';}
  }

  else if(classId===1){ // SCHOLAR — academic robes with ink tattoos
    var rc="#5a4a7a",rc2="#4a3a6a",ec="#c8a0e8";
    if(skin){rc=skin.palette.ar||rc;rc2=skin.palette.sh||rc2;ec=skin.palette.ey||ec;}
    out+=pb(24,0,14,34,rc,4); // robe leg L
    out+=pb(42,0,14,34,rc,4); // robe leg R
    out+=pb(14,28,52,40,rc,6); // body
    out+=pb(16,42,48,20,rc2,4); // robe front
    // ink script tattoos
    out+=brd(20,44,14,10,ec+'44',2,'animation:arcane-pulse 3s ease-in-out infinite;');
    out+=brd(46,44,14,10,ec+'33',2,'animation:arcane-pulse 3s ease-in-out infinite .6s;');
    out+=pb(37,36,6,24,rc2,1); // center fold
    out+=pb(2,32,12,30,rc,5); // sleeve L
    out+=pb(66,32,12,30,rc,5); // sleeve R
    out+=pb(2,32,12,4,ec+'44',1,'animation:arcane-pulse 3s ease-in-out infinite;'); // cuff L
    out+=pb(66,32,12,4,ec+'44',1,'animation:arcane-pulse 3s ease-in-out infinite;'); // cuff R
    out+=pb(28,66,24,8,skinCol,3); // neck
    out+=pb(18,72,44,34,skinCol,8); // head
    out+=pb(16,94,48,16,"#3a2a4a",5); // hair/hat base
    out+=pb(14,102,52,10,"#2a1a3a",3); // hat brim
    out+=pb(30,110,20,18,"#3a2a4a",4); // hat top
    // glasses
    out+=brd(22,86,14,10,ec+'88',3,'animation:arcane-pulse 4s ease-in-out infinite;');
    out+=brd(44,86,14,10,ec+'88',3,'animation:arcane-pulse 4s ease-in-out infinite .5s;');
    out+=pb(36,90,8,2,ec+'66',0);
    out+=pb(26,90,4,6,skinCol,8); // eye L
    out+=pb(50,90,4,6,skinCol,8); // eye R
    // floating book pages
    if(px>=60){
      out+='<div style="position:absolute;left:'+Math.round(68*sc)+'px;bottom:'+Math.round(40*sc)+'px;width:'+Math.round(10*sc)+'px;height:'+Math.round(13*sc)+'px;background:#fff8e0;border-radius:1px;animation:leaf-drift 3s ease-in-out infinite;opacity:.6;transform-origin:center bottom;"></div>';
      out+='<div style="position:absolute;left:'+Math.round(-8*sc)+'px;bottom:'+Math.round(50*sc)+'px;width:'+Math.round(10*sc)+'px;height:'+Math.round(13*sc)+'px;background:#f0e8d0;border-radius:1px;animation:leaf-drift 3s ease-in-out infinite .8s;opacity:.5;transform-origin:center bottom;"></div>';
    }
  }

  else if(classId===2){ // HUSTLER — tracksuit with speed lines
    var tc="#1a3a6a",tc2="#2a5a9a",ec="#4a8fff";
    if(skin){tc=skin.palette.sh||tc;tc2=skin.palette.ar||tc2;ec=skin.palette.ey||ec;}

    out+=pb(48,4,4,24,ec+'55',0);
    out+=pb(14,28,52,40,tc,5); // jacket
    out+=pb(16,50,48,10,tc2,0); // jacket stripe
    out+=pb(37,28,6,40,"#0a2a5a",0); // zip line
    out+=pb(2,32,12,30,tc,4); // arm L
    out+=pb(66,32,12,30,tc,4); // arm R
    out+=pb(2,44,12,6,tc2,0); // arm stripe L
    out+=pb(66,44,12,6,tc2,0); // arm stripe R
    out+=pb(28,66,24,8,skinCol,3); // neck
    out+=pb(18,72,44,32,skinCol,8); // head
    out+=pb(16,90,48,18,tc,5); // cap
    out+=pb(12,92,56,6,"#0a1a3a",2); // cap brim
    out+=pb(26,88,6,6,ec,8,'box-shadow:0 0 '+Math.ceil(4*sc)+'px '+ec+';'); // eye L
    out+=pb(48,88,6,6,ec,8,'box-shadow:0 0 '+Math.ceil(4*sc)+'px '+ec+';'); // eye R
    // speed lines

function xpForSkillLv(l){return Math.floor(100*Math.pow(1.4,l-1));}
function xpToReachTotalLv(n){if(n<=1)return 0;return 100*(n-1)*n/2;}
function totalLv(){var tx=G.totalXP||0,lv=1;while(xpToReachTotalLv(lv+1)<=tx)lv++;return lv;}
function totalLvProgress(){var tx=G.totalXP||0,lv=totalLv();return{earned:tx-xpToReachTotalLv(lv),needed:xpToReachTotalLv(lv+1)-xpToReachTotalLv(lv)};}
function domainLv(d){var t=0;SKILLS.forEach(function(s){if(s.domain===d)t+=G.skills[s.id].level;});return t;}
function playerTitle(){var tl=totalLv(),t=TITLES[0];for(var i=0;i<TITLES.length;i++){if(tl>=TITLES[i][0])t=TITLES[i];}return t[1];}
function getDayKey(){
  var n=new Date();
  // If before 4AM local time, treat as previous day
  if(n.getHours()<4){n.setDate(n.getDate()-1);}
  // Build YYYY-MM-DD from LOCAL date parts (not UTC)
  var y=n.getFullYear();
  var m=String(n.getMonth()+1).padStart(2,"0");
  var d=String(n.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+d;
}
function doneToday(id){return(G.dailyDone||{})[id]===getDayKey();}
function markDone(id){if(!G.dailyDone)G.dailyDone={};G.dailyDone[id]=getDayKey();}
function flameColor(n){if(n>=30)return"#f4c842";if(n>=15)return"#c456a0";if(n>=8)return"#cc2244";if(n>=4)return"#e8923a";return"#4a8fff";}
function skById(id){for(var i=0;i<SKILLS.length;i++){if(SKILLS[i].id===id)return SKILLS[i];}return null;}
function acById(id){for(var i=0;i<QUICK_ACTIONS.length;i++){if(QUICK_ACTIONS[i].id===id)return QUICK_ACTIONS[i];}return null;}
function shopById(id){for(var i=0;i<SHOP.length;i++){if(SHOP[i].id===id)return SHOP[i];}return null;}
function questById(id){for(var i=0;i<G.quests.length;i++){if(G.quests[i].id===id)return G.quests[i];}return null;}

var toastTm=null;
function showToast(msg){var el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");if(toastTm)clearTimeout(toastTm);toastTm=setTimeout(function(){el.classList.remove("show");},3000);}

function isBoostActive(){
  if((G.boostActionsLeft||0)>0)return"actions";
  if(G.boostHourExpiry&&Date.now()<G.boostHourExpiry)return"hours";
  return false;
}
function getBoostLabel(){
  var type=isBoostActive();
  if(type==="actions")return"2x XP · "+G.boostActionsLeft+" action"+(G.boostActionsLeft!==1?"s":"")+" left";
  if(type==="hours"){var mins=Math.round((G.boostHourExpiry-Date.now())/60000);var h=Math.floor(mins/60),m=mins%60;return"2x XP · "+(h>0?h+"h ":"")+m+"m left";}
  return"";
}

function earnXP(skillId,amount,label,eg){
  // Apply boost multiplier
  var boost=isBoostActive();
  if(boost){
    amount=amount*2;
    if(boost==="actions"){G.boostActionsLeft--;if(G.boostActionsLeft<=0){G.boostActionsLeft=0;showToast("XP Boost expired!");}}
  }
  var sk=G.skills[skillId];
  var nx=sk.xp+amount,nl=sk.level,lv=false;
  while(nx>=xpForSkillLv(nl)){nx-=xpForSkillLv(nl);nl++;lv=true;}
  G.skills[skillId]={xp:nx,level:nl};
  G.gold+=eg;G.totalXP=(G.totalXP||0)+amount;
  G.log.unshift({label:label,xp:amount,gold:eg,time:new Date().toLocaleTimeString(),date:new Date().toLocaleDateString(),skillId:skillId});
  if(G.log.length>50)G.log.pop();
  var s=skById(skillId);
  if(G._suppressLvlUp){
    // Quest popup will handle level ups after Claim is clicked
    if(lv){G._pendingLvUps=(G._pendingLvUps||[]).concat([{skill:s,level:nl}]);}
  } else {
    if(lv){showLvlUp(s,nl);}
    else{showToast("+"+amount+" XP  +"+eg+" Gold");}
    var newTotalLv=totalLv();
    if(newTotalLv>G._lastTotalLv){G._lastTotalLv=newTotalLv;showTotalLvUp(newTotalLv);}
  }
  updateStreak();savePersist();render();
}

  var prev=new Date();prev.setDate(prev.getDate()-1);prev.setHours(prev.getHours()-4);
  var pk=prev.toISOString().slice(0,10);
  // Update login streak
  if(G.lastLoginStreakDate===pk){
    G.loginStreakDays=(G.loginStreakDays||0)+1;
  } else if(!G.lastLoginStreakDate){
    G.loginStreakDays=1;
  } else {
    G.loginStreakDays=1; // reset
  }
  G.lastLoginStreakDate=dk;
  // Check for milestone reward
  var reward=LOGIN_STREAK_REWARDS.filter(function(r){return r.day===G.loginStreakDays;})[0]||null;
  if(reward){
    G.gold=(G.gold||0)+reward.gold;
    if(reward.gems)G.gems=(G.gems||0)+reward.gems;
    if(reward.chest==="common")G.chests=(G.chests||0)+1;
    else if(reward.chest==="rare")G.rareChests=(G.rareChests||0)+1;
    else if(reward.chest==="legendary")G.legendaryChests=(G.legendaryChests||0)+1;
    if(reward.chest)G.totalChestsEarned=(G.totalChestsEarned||0)+1;

  // Unlock streak skins
  if(!G.unlockedSkins)G.unlockedSkins=["default"];

function updateStreak(){
  var today=new Date().toLocaleDateString();
  var cnt=G.log.filter(function(e){return e.date===today;}).length;
  if(cnt<3)return;
  var dk=getDayKey();
  if(G.lastStreakDate===dk)return;
  var prev=new Date();prev.setDate(prev.getDate()-1);prev.setHours(prev.getHours()-4);
  var pk=prev.toISOString().slice(0,10);
  if(G.lastStreakDate===pk||G.lastStreakDate===null)G.streakDays=(G.streakDays||0)+1;
  else if(G.lastStreakDate!==dk)G.streakDays=1;
  G.lastStreakDate=dk;
  // Streak milestone gems
  var s=G.streakDays;
  if(s===7){earnGems(3,"7-day streak milestone!");}
  else if(s===14){earnGems(5,"14-day streak milestone!");}
  else if(s===30){earnGems(10,"30-day streak milestone!");}
}

function renderQuestItem(q, isRotating, isCustom){
  var sk=skById(q.skill||"discipline");
  var color=sk?sk.color:"#f4c842";
  var pct=q.target>1?Math.min(100,Math.round(((q.progress||0)/q.target)*100)):0;
  var hasProgress=q.target>1&&q.type&&q.type!=="manual";

  var tag="";
  if(isRotating){
    if(q.rtype==="daily")tag='<span class="quest-tag quest-tag-daily">Daily</span>';
    else if(q.rtype==="weekly")tag='<span class="quest-tag quest-tag-weekly">Weekly</span>';
    else if(q.rtype==="weekend")tag='<span class="quest-tag quest-tag-weekend">Weekend</span>';
  } else if(isCustom){
    tag='<span class="quest-tag quest-tag-custom">Custom</span>';
  } else {
    if(q.type&&q.type!=="manual")tag='<span class="quest-tag quest-tag-auto">Auto-tracked</span>';
  }

  var progressHTML="";
  if(hasProgress&&!q.done){
    progressHTML=
      '<div class="quest-progress-wrap"><div class="quest-progress-bar" style="width:'+pct+'%;background:'+color+';"></div></div>'+
      '<div class="quest-progress-label">'+(q.progress||0)+' / '+q.target+'</div>';
  }

  var btnHTML="";
  if(!q.done){
    if(isCustom&&(q.type==="manual"||!q.type)){
      // Custom manual quest
      btnHTML='<button class="complete-btn" onclick="manualCompleteQuest(this.dataset.id)" data-id='+JSON.stringify(q.id)+'>Complete</button>';
    } else if(!isRotating&&!isCustom&&(q.type==="manual"||!q.type)){
      // Standard manual quest (Treasure Hunter etc)
      btnHTML='<button class="complete-btn" onclick="completeQuest('+q.id+')">Complete</button>';
    }
    // Auto-tracked quests (type=count/streak/domain) get no button — auto-complete on progress
  }

  var delBtn=isCustom&&!q.done?'<button class="quest-del-btn" onclick="deleteCustomQuest(this.dataset.id)" data-id="'+q.id+'"" title="Delete">✕</button>':"";

  var chestBadge=q.chest&&!q.done?'<span style="font-size:11px;color:var(--gold);margin-left:6px;">+'+(q.chest==="legendary"?"🌟":q.chest==="rare"?"🎁":"📦")+'</span>':"";

  return '<div class="quest-item'+(q.done?" done":"")+(isRotating?" rotating":"")+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;">'+
      '<div style="flex:1;">'+
        '<div class="quest-title" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">'+(q.done?"✓ ":"")+q.title+tag+chestBadge+'</div>'+
        '<div class="quest-desc">'+(q.desc||"")+'</div>'+
        '<div class="quest-rewards">'+
          '<span style="color:'+color+';">+'+q.xp+' XP</span>'+
          '<span style="color:var(--gold);">+'+(q.gold||0)+'g</span>'+
          '<span style="color:var(--text2);">'+(sk?sk.name:"")+'</span>'+
        '</div>'+
        progressHTML+
      '</div>'+
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">'+
        btnHTML+delBtn+
        (isRotating&&!q.done?(function(){var dl=getQuestDeadline(q);return dl?'<div style="font-size:10px;color:'+dl.color+';letter-spacing:.3px;margin-top:2px;font-family:"Cinzel",serif;">'+(dl.urgent?'⚠ ':'')+dl.label+'</div>':'';}()):"")+ 
      '</div>'+
    '</div>'+
  '</div>';
}

  function hl(text){if(!q)return esc(text);return esc(text).replace(new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),'<mark class="hl">$1</mark>');}

function rTodo(){
  var todos=G.todos||[];
  var done=todos.filter(function(t){return t.done;}).length;
  var total=todos.length;
  var pending=todos.filter(function(t){return !t.done;}).length;
  var canClaim=done>=5&&!G.todoClaimedToday;

  // Progress bar
  var pct=total>0?Math.round(done/total*100):0;
  var progressBar=total>0?
    '<div style="background:var(--bg);border-radius:8px;height:8px;margin:12px 0 4px;overflow:hidden;">'+

    '</div>'+
    '<div style="font-size:11px;color:var(--text3);text-align:right;">'+done+' / '+total+' done</div>':
    '';

  // XP reward banner
  var xpBanner=canClaim?
    '<div style="background:linear-gradient(135deg,#0f2a1a,#07150d);border:1px solid #2ab88a55;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">'+

        '<div style="font-size:11px;color:var(--text2);">Claim your XP reward</div>'+
      '</div>'+
      '<button onclick="claimTodoXP()" style="background:linear-gradient(135deg,#2ab88a,#1a9a6a);border:none;border-radius:10px;padding:10px 16px;font-family:\"Cinzel\",serif;font-size:12px;font-weight:700;color:#fff;cursor:pointer;">+'+TODO_XP+' XP</button>'+
    '</div>':

window.addTodo=function(){
  var inp=document.getElementById("todoInput");
  if(!inp)return;
  var text=inp.value.trim();
  if(!text){showToast("Type a task first!");return;}
  if(!G.todos)G.todos=[];
  G.todos.unshift({text:text,done:false,createdAt:Date.now()});
  inp.value="";
  savePersist();
  G.tab="todo";render();
};

window.toggleTodo=function(idx){
  if(!G.todos||!G.todos[idx])return;
  G.todos[idx].done=!G.todos[idx].done;
  G.todos[idx].doneAt=G.todos[idx].done?Date.now():null;
  G.todos.sort(function(a,b){return (a.done===b.done)?0:a.done?1:-1;});
  savePersist();
  G.tab="todo";render();
  var done=G.todos.filter(function(t){return t.done;}).length;
  if(done===5)showToast("🎉 5 tasks done! Claim your +"+TODO_XP+" XP reward!");
};

window.deleteTodo=function(idx){
  if(!G.todos)return;
  G.todos.splice(idx,1);
  savePersist();
  G.tab="todo";render();
};

window.clearDoneTodos=function(){
  if(!G.todos)return;
  G.todos=G.todos.filter(function(t){return !t.done;});
  savePersist();
  G.tab="todo";render();
  showToast("Completed tasks cleared.");
};

window.claimTodoXP=function(){
  var done=(G.todos||[]).filter(function(t){return t.done;}).length;
  if(done<5){showToast("Complete at least 5 tasks first!");return;}
  var xp=TODO_XP;
  G.xp=(G.xp||0)+xp;
  G.totalXP=(G.totalXP||0)+xp;
  G.todoClaimedToday=true;
  G.todoClaimedCount=(G.todoClaimedCount||0)+1;
  savePersist();
  G.tab="todo";render();
  showToast("+"+xp+" XP earned! Keep building good habits.");
};

  G._suppressLvlUp=true;
  G._pendingLvUps=G._pendingLvUps||[];

  var clsBonus=applyClassBonus(a.xp,a.gold,a.domain,G.streakDays);
  var petBonus=applyPetBonus(clsBonus.xp,clsBonus.gold,a.domain);
  earnXP(a.skill,petBonus.xp,a.label,petBonus.gold);
  checkOrbBonus();
  checkInfernoDragonGem(a.id);
  updateDCProgress(a.id, a.domain);
  // Check quest progress — if a quest completes it shows popup, then level ups after Claim
  var prevPending=G._pendingLvUps.length;
  checkQuestProgress(id, a.domain);
  // If no quest completed, fire level ups now
  if(G._pendingLvUps.length===prevPending){
    G._suppressLvlUp=false;
    var pending=G._pendingLvUps.slice();
    G._pendingLvUps=[];
    pending.forEach(function(item){showLvlUp(item.skill,item.level);});
    var newTL=totalLv();

  if(a.repeatable&&evt){
    var sk=skById(a.skill);
    showXPPop(evt.clientX,evt.clientY,petBonus.xp,petBonus.gold,sk?sk.color:"#f4c842");
